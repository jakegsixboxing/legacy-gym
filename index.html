<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Legacy Gym</title>
<meta name="description" content="Legacy Gym Central Coast — boxing, weights, functional fitness, recovery and the members chat.">
<meta name="theme-color" content="#0b0b0c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Legacy Gym">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0b0b0c; --panel:#121214; --panel2:#18181b; --line:#26262b;
  --gold:#c9a44c; --gold-dim:#8a7136; --text:#f2f0eb; --muted:#9a9891;
  --danger:#e05252; --ok:#4bc97a;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:'Montserrat',sans-serif;overscroll-behavior-y:none}
button{font-family:inherit;cursor:pointer;border:none}
input,select,textarea{font-family:inherit}
.hidden{display:none !important}

/* ---------- AUTH ---------- */
#authScreen{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:32px 24px calc(32px + env(safe-area-inset-bottom));max-width:440px;margin:0 auto}
.brandBlock{text-align:center;margin-bottom:36px}
.brandLogo{max-width:200px;max-height:110px;margin:0 auto 14px;display:block}
.brandMark{font-family:'Oswald',sans-serif;font-weight:600;font-size:42px;letter-spacing:6px;color:#fff;line-height:1.05;text-transform:uppercase}
.brandSub{font-weight:600;font-size:12px;letter-spacing:6px;color:var(--muted);margin-top:8px;text-transform:uppercase}
.brandRule{width:56px;height:2px;background:var(--gold);margin:18px auto 0}
.authCard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:24px 20px}
.authTabs{display:flex;gap:8px;margin-bottom:20px}
.authTabs button{flex:1;padding:11px;border-radius:8px;background:transparent;border:1px solid var(--line);color:var(--muted);font-weight:700;font-size:12px;letter-spacing:2px;text-transform:uppercase}
.authTabs button.active{background:var(--gold);border-color:var(--gold);color:#161307}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.field input{width:100%;padding:13px 14px;border-radius:8px;border:1px solid var(--line);background:#0e0e10;color:var(--text);font-size:16px}
.field input:focus{outline:none;border-color:var(--gold-dim)}
.row2{display:flex;gap:10px}.row2 .field{flex:1}
.btnGold{width:100%;padding:15px;border-radius:8px;background:var(--gold);color:#161307;font-weight:800;font-size:13px;letter-spacing:2.5px;text-transform:uppercase}
.btnGold:disabled{opacity:.5}
.authMsg{margin-top:14px;font-size:13px;text-align:center;color:var(--danger);min-height:18px}
.authMsg.ok{color:var(--ok)}

/* ---------- APP SHELL ---------- */
#appScreen{min-height:100vh;padding-bottom:calc(84px + env(safe-area-inset-bottom))}
.topBar{position:sticky;top:0;z-index:20;background:rgba(11,11,12,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:calc(14px + env(safe-area-inset-top)) 18px 14px;display:flex;align-items:center;justify-content:space-between}
.topBrand{display:flex;align-items:center;gap:10px}
.topBrand img{height:30px;width:auto}
.topBrand .tbText{font-family:'Oswald',sans-serif;font-weight:600;font-size:17px;letter-spacing:4px;color:#fff;text-transform:uppercase}
.topBrand .tbText small{display:block;font-size:8.5px;letter-spacing:3px;color:var(--gold);font-weight:600}
.profileBtn{width:38px;height:38px;border-radius:50%;background:var(--panel2);border:1px solid var(--line);color:var(--gold);font-weight:800;font-size:14px;display:flex;align-items:center;justify-content:center}
main{max-width:520px;margin:0 auto;padding:20px 18px}

/* hero */
.hero{border-radius:14px;overflow:hidden;border:1px solid var(--line);background:linear-gradient(160deg,#15161a 0%,#0a0b0e 70%);padding:30px 22px;margin-bottom:20px;position:relative}
.hero::after{content:"";position:absolute;left:22px;bottom:22px;width:44px;height:3px;background:var(--gold)}
.heroKicker{font-size:11px;font-weight:700;letter-spacing:4px;color:var(--gold);text-transform:uppercase;margin-bottom:10px}
.heroTitle{font-family:'Oswald',sans-serif;font-size:30px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;line-height:1.1;margin-bottom:10px}
.heroText{font-size:13px;color:var(--muted);line-height:1.6;padding-bottom:18px}

/* section + cards */
.secTitle{font-size:12px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin:26px 0 12px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:12px}
.card h3{font-family:'Oswald',sans-serif;font-size:19px;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.card .sub{color:var(--gold);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.card p{color:var(--muted);font-size:13.5px;line-height:1.6}
.card ul{list-style:none;margin-top:10px}
.card ul li{color:#d8d5cd;font-size:13.5px;line-height:1.5;padding:5px 0 5px 22px;position:relative}
.card ul li::before{content:'';position:absolute;left:2px;top:12px;width:8px;height:8px;border:1.5px solid var(--gold);border-radius:2px;transform:rotate(45deg)}
.priceRow{display:flex;align-items:baseline;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid var(--line)}
.price{font-size:22px;font-weight:800}
.price small{font-size:13px;font-weight:500}
.priceNote{color:var(--muted);font-size:12px}
.notice{background:rgba(201,164,76,.12);border:1px solid var(--gold);border-radius:12px;padding:14px 16px;margin-bottom:14px;font-size:13px;line-height:1.5;color:#e8e2d2}
.notice b{color:var(--gold)}
.pillRow{display:flex;flex-wrap:wrap;gap:8px}
.pill{background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:7px 13px;font-size:12px;color:#d8d5cd;letter-spacing:.5px}
.pathway{display:flex;align-items:center;justify-content:space-between;gap:4px;margin:6px 0 2px}
.pathway .step{flex:1;text-align:center;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 4px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.pathway .step.goldStep{border-color:var(--gold);color:var(--gold)}
.pathway .arrow{color:var(--gold);font-size:13px}
.btnLink{display:block;width:100%;text-align:center;background:transparent;color:var(--gold);border:1.5px solid var(--gold);font-weight:800;font-size:12px;letter-spacing:2px;text-transform:uppercase;border-radius:10px;padding:13px;margin-top:6px;text-decoration:none}

/* boxing sub-tabs + sparring hub */
.subTabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
.subTabs button{flex:1 1 30%;min-width:30%;padding:11px 4px;border-radius:8px;background:transparent;border:1px solid var(--line);color:var(--muted);font-weight:700;font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase}
.subTabs button.active{background:var(--gold);border-color:var(--gold);color:#161307}
.addBtn{color:var(--gold);font-size:24px;font-weight:600;border:1px solid var(--gold-dim);border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.byoLbl{display:block;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin:14px 0 8px}
.byoLbl:first-child{margin-top:0}
.pillBtns{display:flex;gap:8px}
.pillBtns button{flex:1;padding:11px 4px;border-radius:8px;background:transparent;border:1px solid var(--line);color:var(--muted);font-weight:700;font-size:12px;letter-spacing:.5px}
.pillBtns button.on{background:var(--gold);border-color:var(--gold);color:#161307}
.miniSel{margin-top:8px;background:var(--panel2);border:1px solid var(--line);color:var(--muted);border-radius:8px;padding:8px 10px;font-size:12px;display:block}

/* division badges + belts */
.fcPhotoWrap{position:relative;flex-shrink:0}
.dvBadge{position:absolute;bottom:-8px;right:-8px;border-radius:10px;padding:5px 9px;font-size:9px;font-weight:800;letter-spacing:1px;line-height:1;display:flex;align-items:baseline;text-transform:uppercase;overflow:hidden;
  background:linear-gradient(135deg,rgba(255,255,255,.16),rgba(255,255,255,.03) 45%,rgba(255,255,255,.1));
  backdrop-filter:blur(9px);-webkit-backdrop-filter:blur(9px)}
.dvBadge::after{content:"";position:absolute;top:-70%;left:-40%;width:45%;height:240%;transform:rotate(24deg);background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);animation:holoSweep 3.4s ease-in-out infinite}
@keyframes holoSweep{0%,55%{left:-45%}100%{left:135%}}
.dvBadge b{font-family:'Oswald',sans-serif;font-size:17px;font-weight:700;margin-right:1.5px;line-height:.9}
.dvPRO{color:#f3d689;border:1px solid rgba(230,193,92,.65);box-shadow:0 4px 14px rgba(0,0,0,.5),0 0 16px rgba(230,193,92,.4);text-shadow:0 0 10px rgba(230,193,92,.7)}
.dvAM{color:#eef1f5;border:1px solid rgba(217,219,224,.65);box-shadow:0 4px 14px rgba(0,0,0,.5),0 0 16px rgba(217,219,224,.35);text-shadow:0 0 10px rgba(217,219,224,.7)}
.dvFC{color:#eda963;border:1px solid rgba(205,127,50,.65);box-shadow:0 4px 14px rgba(0,0,0,.5),0 0 16px rgba(205,127,50,.4);text-shadow:0 0 10px rgba(205,127,50,.7)}
.dvSC{color:#ff9d9d;border:1px solid rgba(224,82,82,.65);box-shadow:0 4px 14px rgba(0,0,0,.5),0 0 16px rgba(224,82,82,.4);text-shadow:0 0 10px rgba(224,82,82,.7)}
.beltRow{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:14px;position:relative}
.belt{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:10px;padding:8px 6px 6px;text-align:center}
.belt svg{width:100%;height:auto;max-height:58px;display:block;filter:drop-shadow(0 3px 5px rgba(0,0,0,.45))}
.titleChip{cursor:pointer;border-color:var(--gold-dim);color:var(--gold)}
.belt small{display:block;font-size:8.5px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-top:4px;line-height:1.3}
.ckRow{display:flex;align-items:center;gap:10px;padding:9px 2px;font-size:13.5px;color:#d8d5cd;border-bottom:1px solid var(--line);cursor:pointer}
.ckRow:last-child{border-bottom:none}
.ckRow input{width:18px;height:18px;accent-color:#c9a44c;flex-shrink:0}

/* staff task checklist */
.ckTask{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);font-size:13.5px}
.ckTask:last-child{border-bottom:none}
.ckTask small{display:block;color:var(--muted);font-size:11.5px;margin-top:3px;font-weight:400}
.ckBoxes{display:flex;gap:8px;flex-shrink:0;padding-top:1px}
.ckBox{width:28px;height:28px;border:1.5px solid var(--line);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:rgba(255,255,255,.22);cursor:pointer;transition:transform .1s;user-select:none}
.ckBox:active{transform:scale(.9)}
.ckBox.on{background:var(--ok);border-color:var(--ok);color:#08170c}
.ckBox.off{background:var(--danger);border-color:var(--danger);color:#fff}

/* social events */
.evDate{width:52px;flex-shrink:0;background:var(--panel2);border:1px solid var(--gold-dim);border-radius:10px;text-align:center;padding:8px 2px}
.evDate span{display:block;font-size:22px;font-weight:900;color:var(--gold);line-height:1.1}
.evDate small{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}

/* search + collapsible cards */
.wodSearch{width:100%;padding:13px 14px;border-radius:12px;border:1px solid var(--line);background:var(--panel);color:var(--text);font-size:15px;outline:none;margin-bottom:12px}
.wodSearch:focus{border-color:var(--gold-dim)}
.foldCard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 18px;margin-bottom:12px}
.foldCard summary{cursor:pointer;font-family:'Oswald',sans-serif;font-size:15px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text);list-style:none;display:flex;justify-content:space-between;align-items:center}
.foldCard summary::after{content:"›";color:var(--gold);font-size:20px;transform:rotate(90deg);transition:transform .15s}
.foldCard[open] summary::after{transform:rotate(-90deg)}

/* fighter dashboard */
.fightCard{background:linear-gradient(150deg,#1d1a12 0%,#111013 55%,#0b0b0c 100%);border:1.5px solid var(--gold);border-radius:16px;padding:20px;margin-bottom:14px;position:relative;overflow:hidden}
.fightCard::before{content:"LEGACY";position:absolute;right:-10px;top:6px;font-family:'Oswald',sans-serif;font-size:58px;font-weight:700;color:rgba(201,164,76,.06);letter-spacing:6px;pointer-events:none}
.fcBanner{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:-20px -20px 16px;padding:9px 20px;background:rgba(201,164,76,.1);border-bottom:1px solid var(--gold-dim);position:relative}
.fcDiv{font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold)}
.fcTier{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;border-radius:99px;padding:4px 10px;white-space:nowrap}
.fcTier.bronze{background:linear-gradient(135deg,#8c5a2b,#cd7f32);color:#fff}
.fcTier.silver{background:linear-gradient(135deg,#8e9196,#d9dbe0);color:#26282c}
.fcTier.goldT{background:linear-gradient(135deg,#a37e2c,#e6c15c);color:#241c05}
.fcTier.platinum{background:linear-gradient(135deg,#b8c6d4,#f2f6fa);color:#1e2830}
.fcTier.none{border:1px solid var(--line);color:var(--muted)}
.fcTop{display:flex;gap:14px;align-items:center;position:relative}
.fcPhoto{width:78px;height:78px;border-radius:12px;object-fit:cover;border:2px solid var(--gold);flex-shrink:0}
.fcPhotoEmpty{display:flex;align-items:center;justify-content:center;background:var(--panel2);color:var(--gold);font-size:28px;font-weight:800}
.fcRank{display:inline-block;font-size:9.5px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:#161307;background:var(--gold);border-radius:4px;padding:3px 8px;margin-bottom:6px}
.fcName{font-family:'Oswald',sans-serif;font-size:24px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;line-height:1.05}
.fcMeta{color:var(--muted);font-size:12px;margin-top:4px;letter-spacing:.5px}
.fcRecordRow{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:16px;position:relative}
.fcRec{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:10px;text-align:center;padding:10px 2px}
.fcRec span{font-size:22px;font-weight:900;display:block;line-height:1.1}
.fcRec small{font-size:8.5px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.fcRec.gold{border-color:var(--gold-dim)}
.fcRec.gold span{color:var(--gold)}
.rankBar{height:7px;background:var(--panel2);border-radius:99px;margin-top:14px;overflow:hidden;border:1px solid var(--line);position:relative}
.rankFill{height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));border-radius:99px}
.rankLbl{font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-top:6px;text-align:right;font-weight:700}

/* ask me anything */
.amaTile{display:flex;align-items:center;gap:14px;width:100%;background:linear-gradient(135deg,rgba(201,164,76,.16),rgba(201,164,76,.05) 60%),var(--panel);border:1.5px solid var(--gold);border-radius:14px;padding:18px;margin-bottom:14px;color:var(--text)}
.amaMicIcon{width:46px;height:46px;border-radius:50%;background:var(--gold);color:#161307;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.amaMicIcon svg{width:24px;height:24px}
.amaMicBig{width:50px;height:50px;border-radius:12px;background:transparent;border:1.5px solid var(--gold);color:var(--gold);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.amaMicBig svg{width:24px;height:24px}
.amaMicBig.live{background:var(--danger);border-color:var(--danger);color:#fff;animation:amaPulse 1s infinite}
@keyframes amaPulse{0%,100%{opacity:1}50%{opacity:.55}}
.field select{width:100%;padding:13px 14px;border-radius:8px;border:1px solid var(--line);background:#0e0e10;color:var(--text);font-size:16px}
.bpPhoto{width:84px;height:84px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);flex-shrink:0}
.bpPhotoEmpty{display:flex;align-items:center;justify-content:center;background:var(--panel2);color:var(--gold);font-size:30px;font-weight:800}
.statGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.statBox{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 6px;text-align:center}
.statBox .sv{font-size:23px;font-weight:800;color:var(--gold)}
.statBox .sl{font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-top:4px}
.weekRow{display:flex;justify-content:space-between;padding:8px 2px;border-bottom:1px solid var(--line);font-size:13px}
.weekRow:last-child{border-bottom:none}
.sessItem{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--line);font-size:13.5px}
.sessItem:last-child{border-bottom:none}
.sessItem small{display:block;color:var(--muted);font-size:11.5px;margin-top:3px;font-weight:400}
.xBtn{background:transparent;border:1px solid var(--line);color:var(--muted);width:30px;height:30px;border-radius:8px;font-size:15px;flex-shrink:0}
.noteMsg{background:var(--panel2);border:1px solid var(--line);border-radius:12px 12px 12px 4px;padding:10px 13px;margin-bottom:10px}
.noteMsg.coach{background:rgba(201,164,76,.12);border-color:var(--gold-dim);border-radius:12px 12px 4px 12px}
.noteMsg .who{font-size:10.5px;font-weight:800;color:var(--gold);letter-spacing:.5px;margin-bottom:3px;text-transform:uppercase}
.noteMsg .txt{font-size:13.5px;line-height:1.5;white-space:pre-wrap;word-wrap:break-word}
.noteMsg .time{font-size:10px;color:var(--muted);margin-top:4px;text-align:right}

/* workout lists + timer */
.wodRow{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:14px 16px;border:1px solid var(--line);border-radius:12px;background:var(--panel);margin-bottom:8px;cursor:pointer}
.wodRow b{font-family:'Oswald',sans-serif;font-size:15.5px;font-weight:600;letter-spacing:.8px;text-transform:uppercase}
.wodRow small{display:block;color:var(--muted);font-size:11.5px;margin-top:3px}
.wodRow .go{color:var(--gold);font-size:20px}
.backBtn{background:transparent;border:none;color:var(--gold);font-weight:800;font-size:13px;letter-spacing:1px;text-transform:uppercase;padding:2px 0 14px;display:block}
.timerCard{background:linear-gradient(160deg,#17171a 0%,#0b0b0e 75%);border:1px solid var(--line);border-radius:14px;padding:24px 20px;text-align:center;margin-bottom:14px}
.timerPhase{font-size:13px;font-weight:800;letter-spacing:5px;text-transform:uppercase;color:var(--muted)}
.timerPhase.gold{color:var(--gold)}
.timerTime{font-size:64px;font-weight:900;font-variant-numeric:tabular-nums;line-height:1.1;margin:4px 0 2px}
.timerSub{font-size:12px;color:var(--muted);line-height:1.5;min-height:18px}
.timerBtns{display:flex;gap:10px;margin-top:16px}
.timerBtns button{flex:1;padding:14px;border-radius:8px;font-weight:800;letter-spacing:2px;text-transform:uppercase;font-size:12px}
.tStart{background:var(--gold);border:none;color:#161307}
.tReset{background:transparent;border:1px solid var(--line);color:var(--muted)}

/* home */
.homeWelcome{margin:6px 0 22px}
.homeWelcome .hwKicker{font-size:11px;font-weight:700;letter-spacing:4px;color:var(--gold);text-transform:uppercase;margin-bottom:8px}
.homeWelcome .hwTitle{font-family:'Oswald',sans-serif;font-size:30px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;line-height:1.15}
.homeCard{display:flex;width:100%;text-align:left;border:1px solid var(--line);border-radius:14px;padding:26px 22px;margin-bottom:14px;position:relative;color:var(--text);min-height:150px;flex-direction:column;justify-content:flex-end;overflow:hidden}
.homeCard::before{content:"";position:absolute;left:0;top:24px;bottom:24px;width:3px;background:var(--gold);border-radius:0 2px 2px 0;z-index:2}
.homeCard::after{content:"›";position:absolute;right:20px;top:50%;transform:translateY(-54%);font-size:30px;font-weight:600;color:var(--gold);z-index:2}
.homeCard>*{position:relative;z-index:2}

.hcBadge{position:absolute;top:14px;right:16px;background:var(--danger);color:#fff;font-size:11px;font-weight:800;min-width:21px;height:21px;border-radius:999px;display:none;align-items:center;justify-content:center;padding:0 7px;z-index:3}

/* chat */
.chatWrap{display:flex;flex-direction:column;height:calc(100vh - 235px)}
#chatMsgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:4px 2px 12px;position:relative}
.chatBgLogo{position:fixed;left:50%;top:48%;transform:translate(-50%,-50%);width:65%;max-width:300px;opacity:.06;pointer-events:none;z-index:0}
.msg{max-width:84%;background:var(--panel);border:1px solid var(--line);border-radius:14px 14px 14px 4px;padding:10px 13px;position:relative;z-index:1}

.msg .txt{font-size:14px;line-height:1.45;word-wrap:break-word;white-space:pre-wrap}
.msg .time{font-size:10px;color:var(--muted);margin-top:4px;text-align:right}
.chatInput{display:flex;gap:8px;padding-top:10px;border-top:1px solid var(--line)}
.chatInput input{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px 14px;color:var(--text);font-size:16px;outline:none}

/* profile */

.okBox{border:1px solid var(--ok);background:rgba(75,201,122,.08);color:var(--ok);border-radius:10px;padding:14px;font-size:13px;line-height:1.55;margin-bottom:14px}
.loadingDots{color:var(--muted);font-size:13px;padding:10px 0}
.emptyMsg{font-size:13px;color:var(--muted);padding:6px 0}

/* bottom nav */
nav{position:fixed;left:0;right:0;bottom:0;z-index:30;background:rgba(13,13,14,.96);backdrop-filter:blur(12px);border-top:1px solid var(--line);display:flex;padding:8px 2px calc(8px + env(safe-area-inset-bottom))}
.navBtn{flex:1;background:transparent;color:#7d838b;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 1px;position:relative}

.navBtn span{font-size:8px;font-weight:800;letter-spacing:.6px;text-transform:uppercase}

function setAuthMode(m){
  authMode=m;
  $("tabLogin").classList.toggle("active",m==="login");
  $("tabSignup").classList.toggle("active",m==="signup");
  $("signupFields").classList.toggle("hidden",m!=="signup");
  $("authGo").textContent=m==="login"?"Log In":"Create Profile";
  $("authMsg").textContent="";
}
async function handleAuth(e){
  e.preventDefault();
  const email=$("authEmail").value.trim(),pass=$("authPass").value;
  const msg=$("authMsg");msg.className="authMsg";msg.textContent="";
  $("authGo").disabled=true;
  try{
    if(authMode==="signup"){
      const first=$("suFirst").value.trim(),last=$("suLast").value.trim(),phone=$("suPhone").value.trim(),dob=$("suDob").value;
      if(!first||!last||!phone||!dob){msg.textContent="Please fill in every field to build your profile.";$("authGo").disabled=false;return false;}
      const {data,error}=await sb.auth.signUp({email,password:pass,options:{data:{first_name:first,last_name:last,phone,dob}}});
      if(error)throw error;
      if(data.session){session=data.session;await ensureProfile();await enterApp();}
      else{msg.className="authMsg ok";msg.textContent="Profile created. Check your email to confirm, then log in.";}
    }else{
      const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
      if(error)throw error;
      session=data.session;await ensureProfile();await enterApp();
    }
  }catch(err){msg.textContent=err.message||"Something went wrong.";}
  $("authGo").disabled=false;return false;
}
async function ensureProfile(){
  const u=session.user;
  let {data}=await sb.from("profiles").select("*").eq("id",u.id).maybeSingle();
  if(!data){
    const md=u.user_metadata||{};
    const ins={id:u.id,email:u.email,first_name:md.first_name||"",last_name:md.last_name||"",phone:md.phone||"",dob:md.dob||null};
    await sb.from("profiles").upsert(ins);
    data=ins;
  }
  profile=data;
  $("profileBtn").textContent=((profile.first_name||"?")[0]+(profile.last_name||"?")[0]).toUpperCase();
}

  if(chatChannel){sb.removeChannel(chatChannel);chatChannel=null;}

}

/* ---- Register For Classes (2 full days ahead) ---- */
function upcomingClasses48(){
  const now=new Date(),out=[];
  for(let off=0;off<=2;off++){
    const day=new Date(now);day.setDate(day.getDate()+off);
    const dow=day.getDay();
    CLASS_SCHEDULE.filter(c=>c.d===dow).forEach(c=>{
      const [h,m]=c.t.split(":").map(Number);
      const start=new Date(day);start.setHours(h,m,0,0);
      if(start>now)out.push({...c,start,date:isoDateLocal(day),off});
    });
  }
  return out.sort((a,b)=>a.start-b.start);
}
async function renderBoxRegister(){
  $("boxContent").innerHTML=`<div class="loadingDots">Loading upcoming classes…</div>`;
  const cls=upcomingClasses48();
  const dates=[...new Set(cls.map(c=>c.date))];
  let regs=[];
  if(dates.length){
    const {data}=await sb.from("class_regs").select("*").in("class_date",dates);
    regs=data||[];
  }
  if(view!=="boxing"||boxSub!=="register")return;
  const c2=$("boxContent");if(!c2)return;
  let html=`<p style="color:var(--muted);font-size:12.5px;margin:-4px 2px 14px;line-height:1.5">Book up to two days ahead — tick attending and the coaches know you're coming. Tap again to pull out.</p>`;
  let lastDate="";
  cls.forEach(c=>{
    if(c.date!==lastDate){
      lastDate=c.date;
      const lbl=c.off===0?"Today":c.off===1?"Tomorrow":"";
      html+=`<div class="secTitle">${lbl?lbl+" — ":""}${fmtDateAU(c.date)}</div>`;
    }
    const these=regs.filter(r=>r.class_date===c.date&&r.class_time===c.t);
    const mine=these.find(r=>r.user_id===session.user.id);
    html+=`<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:baseline;gap:10px">
        <h3 style="font-size:17px">${esc(c.n)}</h3>
        <span style="color:var(--gold);font-weight:800;font-size:14px;flex-shrink:0">${fmtClassTime(c.t)}</span>
      </div>
      <p style="margin-top:6px"><b style="color:var(--gold)">${these.length} attending</b>${these.length?": "+these.map(r=>esc(r.name)).join(", "):""}</p>
      ${mine?`<button class="btnLink" style="border-color:var(--ok);color:var(--ok);margin-top:12px" onclick="unattendClass('${c.date}','${c.t}')">Attending ✓ — Tap To Pull Out</button>`
            :`<button class="btnGold" style="margin-top:12px" onclick="attendClass('${c.date}','${c.t}','${esc(c.n)}')">I'm Attending</button>`}
    </div>`;
  });
  if(!cls.length)html+='<div class="card"><p>No classes in the next two days — check the Timetable tab for the full week.</p></div>';
  c2.innerHTML=html;
}

let byo=(function(){try{return JSON.parse(localStorage.getItem("lg_byo"))||null}catch(e){return null}})()||{len:180,rest:30,db:2,list:[]};
let byoActive=false;
let S={phases:[],idx:0,remain:0,run:false,int:null};
function byoSave(){localStorage.setItem("lg_byo",JSON.stringify(byo));}
function byoFind(id){for(const c of BYO_LIB){const it=c.items.find(x=>x.id===id);if(it)return it;}return null;}
function byoAdd(id){byo.list.push(id);byoSave();renderBoxBYO();}
function byoRm(i){byo.list.splice(i,1);byoSave();renderBoxBYO();}
function byoSet(k,v){byo[k]=v;byoSave();renderBoxBYO();}
function byoRoundLen(it){return it.fixed||byo.len;}
function byoTotal(){let t=0;byo.list.forEach((id,i)=>{const it=byoFind(id);if(!it)return;t+=byoRoundLen(it);if(i<byo.list.length-1)t+=byo.rest;});return t;}

function renderBoxBYO(){
  if(byoActive)return renderBYOTimer();
  const counts={};byo.list.forEach(id=>counts[id]=(counts[id]||0)+1);
  const lib=BYO_LIB.map(c=>`
    <div class="secTitle">${c.cat}</div>
    ${c.items.map(it=>`<div class="wodRow" onclick="byoAdd('${it.id}')">
      <div><b>${it.n}${counts[it.id]?` <span style="color:var(--gold)">×${counts[it.id]}</span>`:""}</b><small>${it.tag}${it.db?" · uses your DB weight":""}${it.fixed?"":""}</small></div>
      <span class="addBtn">+</span>
    </div>`).join("")}`).join("");
  const sess=byo.list.map((id,i)=>{
    const it=byoFind(id);if(!it)return "";
    return `<div class="sessItem"><div><b>R${i+1} — ${it.n}${it.db?" ("+byo.db+"kg)":""}</b><small>${fmtSec(byoRoundLen(it))}${it.seg?" · auto-switching":""}</small></div>
      <button class="xBtn" onclick="event.stopPropagation();byoRm(${i})">×</button></div>`;
  }).join("");
  $("boxContent").innerHTML=`
    <div class="secTitle">Session Settings</div>
    <div class="card">
      <label class="byoLbl">Round Length</label>
      <div class="pillBtns">
        <button class="${byo.len===120?'on':''}" onclick="byoSet('len',120)">2:00 Rounds</button>
        <button class="${byo.len===180?'on':''}" onclick="byoSet('len',180)">3:00 Rounds</button>
      </div>
      <label class="byoLbl">Rest Between Rounds</label>
      <div class="pillBtns">
        <button class="${byo.rest===30?'on':''}" onclick="byoSet('rest',30)">0:30 Rest</button>
        <button class="${byo.rest===60?'on':''}" onclick="byoSet('rest',60)">1:00 Rest</button>
      </div>
      <label class="byoLbl">Dumbbell Weight (DB rounds)</label>
      <div class="pillBtns">
        <button class="${byo.db===1?'on':''}" onclick="byoSet('db',1)">1kg</button>
        <button class="${byo.db===2?'on':''}" onclick="byoSet('db',2)">2kg</button>
        <button class="${byo.db===3?'on':''}" onclick="byoSet('db',3)">3kg</button>
      </div>
    </div>
    ${lib}
    <div class="secTitle">Your Session</div>
    <div class="card">
      ${sess||'<div class="emptyMsg">No rounds yet — tap any round above to add it. Tap twice to do it twice.</div>'}
      ${byo.list.length?`<div class="priceRow"><span class="price">${byo.list.length} rounds</span><span class="priceNote">${fmtSec(byoTotal())} total with rests</span></div>
      <button class="btnGold" style="margin-top:14px" onclick="byoStart()">Confirm — Start My Session</button>
      <button class="btnLink" style="margin-top:10px;border-color:var(--danger);color:var(--danger)" onclick="byo.list=[];byoSave();renderBoxBYO()">Clear Session</button>`:""}
    </div>`;
}
function byoPhases(){
  const p=[];
  byo.list.forEach((id,i)=>{
    const it=byoFind(id);if(!it)return;
    const L=byoRoundLen(it);
    const rn="Round "+(i+1)+" of "+byo.list.length+" — "+it.n+(it.db?" · "+byo.db+"kg":"");
    if(it.seg&&it.seg.work){
      let t=0,on=true;
      while(t<L){const d=Math.min(on?it.seg.work:it.seg.rest,L-t);p.push({b:on?it.seg.wl:"REST",sm:rn,s:d,k:on?"work":"rest"});t+=d;on=!on;}
    }else if(it.seg&&it.seg.alt){
      let t=0,j=0;
      while(t<L){const d=Math.min(it.seg.every,L-t);p.push({b:it.seg.alt[j%it.seg.alt.length],sm:rn,s:d,k:"work"});t+=d;j++;}
    }else{
      p.push({b:it.n.toUpperCase(),sm:rn,s:L,k:"work"});
    }
    if(i<byo.list.length-1){
      const nx=byoFind(byo.list[i+1]);
      p.push({b:"REST",sm:"Next: Round "+(i+2)+" — "+(nx?nx.n:""),s:byo.rest,k:"rest"});
    }
  });
  return p;
}
function byoStart(){
  if(!byo.list.length){toast("Add some rounds first.");return;}
  S={phases:byoPhases(),idx:0,remain:0,run:false,int:null};
  S.remain=S.phases[0].s;
  byoActive=true;renderBoxBYO();window.scrollTo(0,0);
}
function byoExit(){clearInterval(S.int);byoActive=false;renderBoxBYO();}
function renderBYOTimer(){
  $("boxContent").innerHTML=`
    <button class="backBtn" onclick="byoExit()">‹ Back To The Builder</button>
    <div class="timerCard">
      <div class="timerSub" id="sSub"></div>
      <div class="timerPhase gold" id="sPhase">READY</div>
      <div class="timerTime" id="sTime">--:--</div>
      <div class="timerSub" id="sNext"></div>
      <div class="timerBtns"><button class="tReset" onclick="sReset()">Reset</button><button class="tStart" id="sGo" onclick="sToggle()">Start</button></div>
    </div>
    <div class="card">
      <h3 style="font-size:15px">The Session</h3>
      <div style="margin-top:8px">${byo.list.map((id,i)=>{const it=byoFind(id);return `<div class="weekRow"><span>R${i+1} — ${it.n}${it.db?" ("+byo.db+"kg)":""}</span><span style="color:var(--muted)">${fmtSec(byoRoundLen(it))}</span></div>`;}).join("")}</div>
    </div>`;
  updS();
}
function sToggle(){
  if(!S.phases.length)return;
  if(S.idx>=S.phases.length)sReset();
  S.run=!S.run;clearInterval(S.int);
  if(S.run){beep(660,.15);S.int=setInterval(sTick,1000);}
  updS();
}
function sReset(){clearInterval(S.int);S.idx=0;S.remain=S.phases.length?S.phases[0].s:0;S.run=false;updS();}
function sTick(){
  S.remain--;
  if(S.remain>0&&S.remain<=3)beep(880,.12);
  if(S.remain<=0){
    S.idx++;
    if(S.idx>=S.phases.length){S.run=false;clearInterval(S.int);beep(520,.4);setTimeout(()=>beep(520,.4),450);setTimeout(()=>beep(780,.8),900);}
    else{S.remain=S.phases[S.idx].s;beep(520,.5);}
  }
  updS();
}
function updS(){
  const ph=$("sPhase");if(!ph)return;
  const tm=$("sTime"),sub=$("sSub"),nx=$("sNext"),go=$("sGo");
  if(S.idx>=S.phases.length){
    ph.textContent="DONE";ph.className="timerPhase gold";tm.textContent="0:00";
    sub.textContent="Session complete";nx.textContent=byo.list.length+" rounds in the bank. Well earned.";go.textContent="Go Again";return;
  }
  const p=S.phases[S.idx];
  ph.textContent=p.b;
  ph.className="timerPhase "+(p.k==="rest"?"":"gold");
  tm.textContent=fmtSec(S.remain);
  sub.textContent=p.sm;
  const n=S.phases[S.idx+1];
  nx.textContent=n?("Next: "+n.b.toLowerCase()+" · "+fmtSec(n.s)):"Final stretch";
  go.textContent=S.run?"Pause":"Start";
}

async function loadSparringData(){
  const uid=session.user.id;
  const isC=profile&&profile.is_coach;
  const [bp,ss,nt,fn,nm,an,cl,ac]=await Promise.all([
    sb.from("boxer_profiles").select("*").eq("user_id",uid).maybeSingle(),
    sb.from("sparring_sessions").select("*").eq("user_id",uid).order("session_date",{ascending:false}).order("created_at",{ascending:false}).limit(500),
    sb.from("sparring_notes").select("*").eq("member_id",uid).order("created_at",{ascending:true}),
    sb.from("fight_nights").select("*").order("event_date",{ascending:true}),
    sb.from("fight_nominations").select("*"),
    isC?sb.from("sparring_notes").select("*").order("created_at",{ascending:true}).limit(500):Promise.resolve({data:[]}),
    sb.from("sparring_clips").select("*").eq("user_id",uid).order("created_at",{ascending:false}).limit(30),
    isC?sb.from("sparring_clips").select("*").order("created_at",{ascending:false}).limit(100):Promise.resolve({data:[]})
  ]);
  boxData={loaded:true,profile:bp.data||null,sessions:ss.data||[],notes:nt.data||[],fights:fn.data||[],noms:nm.data||[],allNotes:an.data||[],clips:cl.data||[],allClips:ac.data||[]};
}
async function renderSparringClub(){
  $("boxContent").innerHTML=`<div class="loadingDots">Loading your sparring hub…</div>`;
  await loadSparringData();
  if(view!=="boxing"||boxSub!=="sparring")return;
  const c=$("boxContent");if(!c)return;
  const bp=boxData.profile;
  let html="";
  if(bpEditing)html+=bpFormHtml(bp||{});

function weightClass(kg){
  if(kg==null||!Number(kg))return null;
  const w=Number(kg);
  const cls=[[48.9,"Light Flyweight"],[50.8,"Flyweight"],[52.2,"Super Flyweight"],[53.5,"Bantamweight"],[55.3,"Super Bantamweight"],[57.2,"Featherweight"],[59,"Super Featherweight"],[61.2,"Lightweight"],[63.5,"Super Lightweight"],[66.7,"Welterweight"],[69.9,"Super Welterweight"],[72.6,"Middleweight"],[76.2,"Super Middleweight"],[79.4,"Light Heavyweight"],[90.7,"Cruiserweight"]];
  for(const [max,n] of cls)if(w<=max)return n;
  return "Heavyweight";
}
const SPAR_RANKS=[[0,"Prospect"],[50,"Contender"],[150,"Main Eventer"],[300,"Title Challenger"],[600,"Champion"],[1000,"Legacy"]];
function rankOf(total){
  let cur=SPAR_RANKS[0],next=null;
  for(let i=0;i<SPAR_RANKS.length;i++){
    if(total>=SPAR_RANKS[i][0])cur=SPAR_RANKS[i];
    else{next=SPAR_RANKS[i];break;}
  }
  return {name:cur[1],at:cur[0],next:next?next[1]:null,nextAt:next?next[0]:null};
}
function weekStreak(){
  const wks=new Set(boxData.sessions.map(s=>isoDateLocal(weekStartOf(s.session_date+"T12:00:00"))));
  let n=0;
  const w=weekStartOf(new Date());
  if(!wks.has(isoDateLocal(w)))w.setDate(w.getDate()-7);
  while(wks.has(isoDateLocal(w))){n++;w.setDate(w.getDate()-7);}
  return n;
}
function topPartner(){
  const t={};
  boxData.sessions.forEach(s=>{const p=(s.partner||"").trim();if(p)t[p]=(t[p]||0)+s.rounds;});
  let best=null;
  Object.entries(t).forEach(([p,r])=>{if(!best||r>best[1])best=[p,r];});
  return best;
}

  if(n.includes("wbo"))return {s:"#d66ba0",m:"silver"};

const MONTH_TIERS=[[50,"Platinum","platinum"],[35,"Gold","goldT"],[20,"Silver","silver"],[10,"Bronze","bronze"]];
function monthlyTier(){
  const mo=new Date();mo.setDate(1);mo.setHours(0,0,0,0);
  const r=boxData.sessions.filter(s=>new Date(s.session_date+"T12:00:00")>=mo).reduce((a,s)=>a+s.rounds,0);
  for(const [min,name,cls] of MONTH_TIERS)if(r>=min)return {r,name,cls,next:MONTH_TIERS.filter(t=>t[0]>r).pop()};
  return {r,name:null,cls:null,next:MONTH_TIERS[MONTH_TIERS.length-1]};
}

function weekStartOf(d){const x=new Date(d);const day=(x.getDay()+6)%7;x.setDate(x.getDate()-day);x.setHours(0,0,0,0);return x;}
function fmtDateAU(iso){const d=new Date(iso+"T12:00:00");return ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getDay()]+" "+d.getDate()+" "+["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][d.getMonth()];}
function sparringStatsHtml(){
  const thisWk=weekStartOf(new Date()).getTime();
  let wkRounds=0,totRounds=0,totMins=0;
  const weeks={};
  boxData.sessions.forEach(s=>{
    const w=weekStartOf(s.session_date+"T12:00:00").getTime();
    weeks[w]=weeks[w]||{r:0,m:0};
    const mins=Number(s.minutes_per_round)||0;
    weeks[w].r+=s.rounds;weeks[w].m+=s.rounds*mins;
    totRounds+=s.rounds;totMins+=s.rounds*mins;
    if(w===thisWk)wkRounds+=s.rounds;
  });
  let wkRows="";
  for(let i=0;i<10;i++){
    const w=new Date(thisWk);w.setDate(w.getDate()-7*i);
    const dd=weeks[w.getTime()];
    const lbl=i===0?"This week":i===1?"Last week":"Wk of "+w.getDate()+" "+["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][w.getMonth()];
    wkRows+=`<div class="weekRow"><span>${lbl}</span><span style="color:${dd?"var(--gold)":"var(--muted)"};font-weight:700">${dd?dd.r+" rounds · "+Math.round(dd.m)+" min":"—"}</span></div>`;
  }
  const streak=weekStreak(),riv=topPartner();
  return `<div class="secTitle">Rounds In The Bank</div>
    ${(streak>0||riv)?`<div class="pillRow" style="margin-bottom:12px">
      ${streak>0?`<span class="pill" style="border-color:var(--gold);color:var(--gold)">${streak}-week streak — keep it alive</span>`:""}
      ${riv?`<span class="pill">Top rival: ${esc(riv[0])} · ${riv[1]} rounds</span>`:""}
    </div>`:""}
    <div class="statGrid">
      <div class="statBox"><div class="sv">${wkRounds}</div><div class="sl">This Week</div></div>
      <div class="statBox"><div class="sv">${totRounds}</div><div class="sl">Total Rounds</div></div>
      <div class="statBox"><div class="sv">${Math.round(totMins)}</div><div class="sl">Total Minutes</div></div>
    </div>
    <details class="foldCard"><summary>Last 10 Weeks</summary><div style="margin-top:6px">${wkRows}</div></details>`;
}

  const ext=(f.name.split(".").pop()||"mp4").toLowerCase().replace(/[^a-z0-9]/g,"")||"mp4";
  const path=session.user.id+"/clip-"+Date.now()+"."+ext;
  toast("Uploading your tape — hang tight, big files take a minute…");
  const {error}=await sb.storage.from("sparring-clips").upload(path,f);
  if(error){toast(error.message);return;}
  const {data}=sb.storage.from("sparring-clips").getPublicUrl(path);
  const cap=$("clipCap")?$("clipCap").value.trim():"";
  const nm=(boxData.profile&&boxData.profile.name)||(((profile&&profile.first_name)||"")+" "+((profile&&profile.last_name)||"")).trim();
  const ins=await sb.from("sparring_clips").insert({user_id:session.user.id,name:nm,video_url:data.publicUrl,caption:cap});

/* Workout timer engine */
let T={phases:[],idx:0,remain:0,up:false,run:false,int:null};
let __ac=null;
function beep(freq,dur){try{__ac=__ac||new (window.AudioContext||window.webkitAudioContext)();const o=__ac.createOscillator(),g=__ac.createGain();o.frequency.value=freq;o.connect(g);g.connect(__ac.destination);g.gain.setValueAtTime(.4,__ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,__ac.currentTime+dur);o.start();o.stop(__ac.currentTime+dur);}catch(e){}}
function fmtSec(s){s=Math.max(0,s);return Math.floor(s/60)+":"+pad(s%60);}
function buildPhases(t){
  if(t.type==="amrap")return {p:[{l:"AMRAP",s:t.min*60}],up:false};
  if(t.type==="fortime")return {p:[{l:"WORK",s:t.cap}],up:true};
  if(t.type==="emom"){const p=[];for(let i=1;i<=t.min;i++)p.push({l:"MIN "+i+" / "+t.min,s:60});return {p,up:false};}
  if(t.type==="tabata"){const p=[];for(let r=1;r<=8;r++){p.push({l:"WORK "+r+"/8",s:20});if(r<8)p.push({l:"REST",s:10});}return {p,up:false};}
  const p=[];for(let r=1;r<=t.rounds;r++){p.push({l:(t.workLabel||"WORK")+" "+r+"/"+t.rounds,s:t.work});if(t.rest&&r<t.rounds)p.push({l:"REST",s:t.rest});}return {p,up:false};
}
function loadWorkoutTimer(t){
  clearInterval(T.int);
  const b=buildPhases(t);
  T={phases:b.p,idx:0,remain:b.p[0].s,up:b.up,run:false,int:null};
  updWT();
}
function wtToggle(){
  if(!T.phases.length)return;
  if(T.idx>=T.phases.length)wtReset();
  T.run=!T.run;clearInterval(T.int);
  if(T.run){beep(660,.15);T.int=setInterval(wtTick,1000);}
  updWT();
}
function wtReset(){clearInterval(T.int);T.idx=0;T.remain=T.phases.length?T.phases[0].s:0;T.run=false;updWT();}
function wtTick(){
  T.remain--;
  if(T.remain>0&&T.remain<=3)beep(880,.12);
  if(T.remain<=0){
    T.idx++;
    if(T.idx>=T.phases.length){T.run=false;clearInterval(T.int);beep(520,.4);setTimeout(()=>beep(520,.4),450);setTimeout(()=>beep(780,.8),900);}
    else{T.remain=T.phases[T.idx].s;beep(520,.5);}
  }
  updWT();
}
function updWT(){
  const ph=$("wtPhase");if(!ph)return;
  const tm=$("wtTime"),go=$("wtGo");
  if(T.idx>=T.phases.length){ph.textContent="DONE";ph.className="timerPhase gold";tm.textContent=T.up?fmtSec(T.phases[0].s):"0:00";go.textContent="Go Again";return;}
  const p=T.phases[T.idx];
  ph.textContent=p.l;
  ph.className="timerPhase"+(p.l==="REST"?"":" gold");
  tm.textContent=T.up?fmtSec(p.s-T.remain):fmtSec(T.remain);
  go.textContent=T.run?"Pause":"Start";
}

const REG_WINDOW_H=24;
function upcomingClasses(){
  const now=new Date(),out=[];
  for(let off=0;off<=1;off++){
    const day=new Date(now);day.setDate(day.getDate()+off);
    const dow=day.getDay();
    CLASS_SCHEDULE.filter(c=>c.d===dow).forEach(c=>{
      const [h,m]=c.t.split(":").map(Number);
      const start=new Date(day);start.setHours(h,m,0,0);
      const diff=(start-now)/36e5;
      if(diff>0&&diff<=REG_WINDOW_H)out.push({...c,start,date:isoDateLocal(day)});
    });
  }
  return out.sort((a,b)=>a.start-b.start);
}

    let s=0;
    keys.forEach(k=>{if(words.some(w=>w===k||(w.length>3&&k.startsWith(w))||(k.length>3&&w.startsWith(k))))s++;});
    if(s>bs){bs=s;best=e;}
  });
  if(bs>=2)return best;
  if(bs===1&&words.length<=3)return best;
  return null;
}

let amaAwait=null;
async function amaAsk(){
  const el=$("amaInput"),q=el.value.trim();
  if(!q)return;
  el.value="";
  amaPush({who:"me",txt:q});
  const me=(((profile&&profile.first_name)||"")+" "+((profile&&profile.last_name)||"")).trim()||"A member";
  if(amaAwait==="follow"){
    amaAwait=null;
    sb.from("ama_misses").insert({user_id:session.user.id,question:"FOLLOW-IN: "+me+" is coming in today on the swipe pass of "+q+"."}).then(()=>{});
    setTimeout(()=>amaPush({who:"ama",txt:"Logged — the team knows you're following "+q+" in today. All good, see you in there."}),350);
    return;
  }
  const nq=amaNorm(q);
  const passWord=/(swipe|pass|fob)/.test(nq);
  if(passWord&&/(forgot|someone|mate|friend|partner|follow|their|else|wife|husband|brother|sister)/.test(nq)){
    amaAwait="follow";
    setTimeout(()=>amaPush({who:"ama",txt:"No dramas — what's the full name of the member whose pass you're following in on? I'll log it with the team so everyone's square."}),350);
    return;
  }
  if(passWord&&/(lost|broke|broken|new|replace|replacement|missing|stopped|work|doesnt|damaged|need)/.test(nq)){
    sb.from("ama_misses").insert({user_id:session.user.id,question:"SWIPE PASS: "+me+" needs a new swipe pass — please have one ready for collection at the front desk."}).then(()=>{});
    setTimeout(()=>amaPush({who:"ama",txt:"I've notified our admin team — your new swipe pass will be waiting for you at the front desk. Collect it during the staffed afternoon hours, Mon–Fri 4–7pm, or the morning coached hours, Mon–Thu 5:15–7:45am and Saturday 8–11am."}),350);
    return;
  }
  const hit=amaMatch(q);
  setTimeout(()=>{
    if(hit)amaPush({who:"ama",txt:hit.a});
    else{
      amaPush({who:"ama",txt:"Good question — I don't have that one yet, but I've passed it to the team so they can teach me the answer. In the meantime, ask in the Members Chat or catch reception 4–7pm Mon–Thu (0401 587 508)."});
      sb.from("ama_misses").insert({user_id:session.user.id,question:q}).then(()=>{});
    }
  },350);
}

  if(!client){toast("Whose session was it?");return;}
  const map={"30":{minutes:30,commission:10,note:""},"45":{minutes:60,commission:15,note:""},"211":{minutes:60,commission:25,note:"2-on-1"}};
  const m=map[$("pcType").value]||map["45"];
  const {error}=await sb.from("pt_commissions").insert({trainer_id:session.user.id,client_name:client,minutes:m.minutes,commission:m.commission,note:m.note,session_date:isoDateLocal()});
  if(error){toast(error.message);return;}
  toast("Logged — "+client+(m.note?" · 2-on-1":" · "+m.minutes+" min")+" · $"+m.commission+" commission banked.");
  renderStaff();
}
async function delComm(id){
  const {error}=await sb.from("pt_commissions").delete().eq("id",id);
  if(error){toast(error.message);return;}
  renderStaff();
}

/* ---- Members Chat (live via Supabase) ---- */
async function initChatFeed(){
  const {data}=await sb.from("legacy_messages").select("*").order("created_at",{ascending:true}).limit(200);
  msgs=data||[];
  updateBadges();
  if(chatChannel)sb.removeChannel(chatChannel);
  chatChannel=sb.channel("legacy-chat")
    .on("postgres_changes",{event:"INSERT",schema:"public",table:"legacy_messages"},payload=>{
      msgs.push(payload.new);
      if(view==="chat"){appendMsg(payload.new);markRead();}
      else updateBadges();
    })
    .subscribe();
}
function msgHtml(m){
  const mine=session&&m.user_id===session.user.id;
  return `<div class="msg${mine?' mine':''}"><div class="who">${esc(m.name)}</div><div class="txt">${esc(m.body)}</div><div class="time">${fmtWhen(m.created_at)}</div></div>`;
}
function renderChat(){
  $("main").innerHTML=`
    <img class="chatBgLogo" src="${LOGO}" alt="">
    <div class="chatWrap">
      <div id="chatMsgs">${msgs.length?msgs.map(msgHtml).join(""):'<div class="emptyMsg" style="text-align:center;margin-top:30px">No messages yet — start the conversation.</div>'}</div>
      <div class="chatInput">
        <input id="msgInput" placeholder="Message the members…" maxlength="1000" onkeydown="if(event.key==='Enter')sendMsg()">
        <button onclick="sendMsg()">➤</button>
      </div>
    </div>`;
  const box=$("chatMsgs");box.scrollTop=box.scrollHeight;
  markRead();
}
function appendMsg(m){
  const box=$("chatMsgs");if(!box)return;
  box.insertAdjacentHTML("beforeend",msgHtml(m));
  box.scrollTop=box.scrollHeight;
}
async function sendMsg(){
  const el=$("msgInput");const v=el.value.trim();
  if(!v)return;
  el.value="";
  const name=((profile.first_name||"")+" "+(profile.last_name||"")).trim()||"Member";
  const {error}=await sb.from("legacy_messages").insert({user_id:session.user.id,name,body:v});
  if(error){toast(error.message);el.value=v;}
}
function unreadCount(){
  if(!session)return 0;
  return msgs.filter(m=>new Date(m.created_at).getTime()>lastRead&&m.user_id!==session.user.id).length;
}
function markRead(){lastRead=Date.now();localStorage.setItem("lg_read",String(lastRead));updateBadges();}
function updateBadges(){
  const n=unreadCount();
  ["navBadge","tileBadge"].forEach(id=>{
    const b=$(id);if(!b)return;
    b.style.display=n>0?"flex":"none";b.textContent=n>99?"99+":n;
  });
  if(navigator.setAppBadge){n>0?navigator.setAppBadge(n).catch(()=>{}):navigator.clearAppBadge&&navigator.clearAppBadge().catch(()=>{});}
}

/* ---- Profile ---- */
function renderProfile(){
  const p=profile||{};
  $("main").innerHTML=`
    <div class="hero"><div class="heroKicker">Member Profile</div><div class="heroTitle">${esc((p.first_name||"")+" "+(p.last_name||""))}</div>
    <div class="heroText">Your Legacy Gym member profile.</div></div>
    <div class="card">
      <div id="pfMsg"></div>
      <form onsubmit="return saveProfile(event)">
        <div class="row2">
          <div class="field"><label>First Name</label><input id="pfFirst" value="${esc(p.first_name||"")}" required></div>
          <div class="field"><label>Last Name</label><input id="pfLast" value="${esc(p.last_name||"")}" required></div>
        </div>
        <div class="field"><label>Email</label><input value="${esc(p.email||"")}" disabled></div>
        <div class="field"><label>Phone</label><input id="pfPhone" type="tel" value="${esc(p.phone||"")}" required></div>
        <div class="field"><label>Date of Birth</label><input id="pfDob" type="date" value="${p.dob||""}" required></div>
        <button class="btnGold" type="submit">Save Profile</button>
      </form>
      <button class="btnSignout" onclick="signOut()">Sign Out</button>
    </div>`;
}
async function saveProfile(e){
  e.preventDefault();
  const upd={first_name:$("pfFirst").value.trim(),last_name:$("pfLast").value.trim(),phone:$("pfPhone").value.trim(),dob:$("pfDob").value};
  const {error}=await sb.from("profiles").update(upd).eq("id",session.user.id);
  if(error)$("pfMsg").innerHTML=`<div class="denyBox">${esc(error.message)}</div>`;
  else{profile={...profile,...upd};$("profileBtn").textContent=(upd.first_name[0]+upd.last_name[0]).toUpperCase();$("pfMsg").innerHTML=`<div class="okBox">Profile saved.</div>`;}
  return false;
}

/* ======== BOOT ======== */
(async function(){
  const {data}=await sb.auth.getSession();
  if(data&&data.session){session=data.session;await ensureProfile();await enterApp();}
  else showAuth();
  sb.auth.onAuthStateChange((_e,s)=>{if(!s&&session){session=null;showAuth();}});
})();
if("serviceWorker" in navigator)navigator.serviceWorker.register("sw.js");
</script>
