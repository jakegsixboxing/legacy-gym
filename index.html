muffins in half, place cut-side up on one tray; arrange bacon on a second tray.","Bake 10–12 minutes until muffins are lightly toasted and bacon is cooked to your liking.","Meanwhile cook eggs in a non-stick pan (fried or folded omelette style), seasoning to taste.","Assemble each muffin with cheese, bacon and egg. Wrap individually in foil or baking paper and store in the fridge.","To reheat, microwave, air fry or sandwich press. Add a little reduced-sugar & salt barbecue or tomato sauce if desired."],"tip":null},{"name":"Protein Pancakes with Banana & Maple Syrup","cal":"~660 cal","tag":null,"ingredients":["70g oats","1 large egg","40g protein powder (~1⅓ scoops)","1 medium banana","2 tbsp sugar-free maple syrup","½ tsp baking powder","90ml almond milk"],"method":["Blend the oats, egg, protein powder, almond milk and baking powder into a batter.","Heat a non-stick pan over medium heat and pour the batter into small pancake circles.","Cook for 2–3 minutes per side until golden brown.","Top the pancakes with sliced banana and a drizzle of sugar-free maple syrup.","The batter should be pourable but not runny — add a small splash more almond milk if it looks too thick."],"tip":"If you want to batch prep these, you can even blend the banana into the batter. Simply cook, store in the fridge and pop them in the toaster or microwave before eating!"}],"Lunch & Dinner":[{"name":"Creamy Mexican Chicken Pasta Bake","cal":"~820 cal","tag":"Makes 4 serves — This is a 4-serve recipe — it works best baked in one large dish, then portioned into 4.","ingredients":["305g pasta, raw weight","960g chicken breast, diced","110g grated light mozzarella","270g low-fat cream cheese","1 large onion, diced (~150g)","2–3 capsicums, diced (~300g)","260g mushrooms, sliced","4 tsp crushed garlic","2 sachets fajita/Mexican seasoning","610g tinned chopped tomatoes","150ml water","Salt & pepper; optional chilli flakes & baby spinach"],"method":["Preheat oven to 190°C.","Add all ingredients except the mozzarella to a large baking dish.","Stir until well combined.","Top with the mozzarella and cover with foil.","Bake for 45 minutes, or until golden and bubbling.","Divide into 4 equal serves. Store in the fridge for lunches."],"tip":null},{"name":"Mexican One-Dish Beef & Rice Bake","cal":"~820 cal","tag":"For best results, we recommend baking in an individual baking dish.","ingredients":["204g lean beef mince","102g jasmine rice (raw weight)","340ml beef stock","55g cottage cheese","28g light tasty cheese / mozzarella","50g pizza sauce","~10g taco seasoning","¼ small capsicum, diced","¼ medium zucchini, diced","⅛ medium brown onion, diced"],"method":["Preheat oven to 190°C.","Add all ingredients except the mozzarella to an oven-safe dish and mix well.","Bake for 50 minutes (check rice is cooked through — each oven varies a little!).","Remove from oven, add the mozzarella, and return to the oven for a further 10 minutes, or until the cheese is melted to your liking.","Serve or store!"],"tip":null},{"name":"Mongolian Beef Noodles","cal":"~820 cal","tag":null,"ingredients":["250g rump or sirloin steak (raw weight), cut into thin strips","1–1½ tsp light soy sauce","½ tsp garlic powder","½ tsp black pepper","pinch baking soda (tenderises the beef)","½ tsp olive oil","100g egg noodles, raw weight","Green onion/scallion (white & green parts, used separately)","1 garlic clove, chopped","⅛ red onion, sliced","¾–1 cup broccoli florets","Garnish: chilli flakes & sesame seeds","Sauce:","2 tbsp soy sauce (1 tbsp dark + 1 tbsp light)","1 tbsp oyster sauce","2 tbsp water","¾ tsp cornflour, mixed with a splash of water"],"method":["Toss beef strips with soy, garlic powder, pepper and baking soda; rest 10 min. Sear in hot oil until browned; set aside.","Cook noodles; drain.","Stir-fry red onion, garlic and broccoli. Return beef, add sauce, simmer until thickened.","Toss through noodles and scallion greens. Garnish and serve."],"tip":null},{"name":"Macro-Friendly Burger Bowl","cal":"~820 cal","tag":null,"ingredients":["275g extra lean beef mince (raw weight)","¼ onion, finely diced","½ tsp garlic powder","¼ tsp sweet paprika","½ tsp extra virgin olive oil (for frying)","300g baby potatoes","½ tsp extra virgin olive oil (for the potatoes)","⅛ large iceberg lettuce, finely shredded","½ tomato, diced (or cherry)","Pickle slices, to taste","Sauce:","1½ tbsp low fat Greek yoghurt","1 tsp tomato sauce","1 tsp American mustard","1 tsp vinegar","dash pickle juice","pinch paprika & garlic powder"],"method":["Roast baby potatoes with oil and salt at 200°C fan until crisp.","Brown mince with onion, garlic powder and paprika.","Whisk burger sauce.","Build the bowl: mince, potatoes, lettuce, tomato, pickles; drizzle with sauce."],"tip":null},{"name":"Chicken Parmy & Chips","cal":"~820 cal","tag":null,"ingredients":["250g chicken breast, raw weight","1 egg, for egg-wash only (negligible)","34g panko breadcrumbs","1 tbsp Italian herbs","50g (~1½ tbsp) pizza sauce","1 tsp olive oil","35g ham slices, e.g. Primo double smoked","30g light tasty cheese, shredded (full standard portion)","225g potato, raw","Fresh salad / steamed veg"],"method":["Chop potato into preferred shaped chips or wedges. Place in a microwave-safe dish and microwave on high for 4–6 minutes, until slightly soft.","In a bowl, whisk 1–2 eggs.","In another large bowl or plate, pour in the panko crumbs (TIP: pour an excess amount of crumbs — only a portion will stick, and it will be much easier!).","While you prepare the chicken, air-fry or oven-fry the potato at 200°C.","Butterfly the chicken breast and roll or use a mallet to flatten. Dip in egg, coat with panko crumbs + herbs.","Pan-fry or air-fry until golden & cooked through (approx 15–20 mins).","While the chicken cooks, make a salad to your liking (or steam veg).","Add tomato paste, ham and cheese on top, then melt until bubbly.","Serve the parmy with chips, salad and enjoy!"],"tip":null},{"name":"Steak, Chips & Salad","cal":"~820 cal" (optional)","Green onions & lime juice, to garnish"],"method":["Season the turkey mince with the spices, then cook in a non-stick pan until browned and cooked through. Set aside.","Scramble the egg (and white, where used) in the pan.","Add the veggies and heat through, then add the cooked rice. Stir in the sauces and sesame oil.","Return the turkey, toss together, and serve with green onions and a squeeze of lime."],"tip":null},{"name":"Mexican Taco Bowl","cal":"~540 cal","tag":null,"ingredients":["Mince: 165g lean beef mince (raw weight) OR 245g turkey breast mince (raw weight)","2–3 tbsp Mexican spice mix, e.g. Old El Paso","Salad: ½ Lebanese cucumber diced, ½ tomato diced, ⅛ red onion finely chopped, handful coriander, 2 large handfuls salad greens","32g natural corn chips","35g avocado","1 tbsp chunky salsa","Squeeze of lime over top"],"method":["Brown the mince, then add the Mexican spice mix and cook until cooked through.","Build the bowl over salad greens with cucumber, tomato, onion & coriander (or sub in your preferred veggies).","Top with corn chips, avocado, salsa and a squeeze of lime."],"tip":null},{"name":"Chicken Burgers with Sweet Potato Chips","cal":"~540 cal","tag":null,"ingredients":["130g chicken breast (raw weight), seasoned with Portuguese chicken spice / paprika","1 brioche bun (e.g. Tip Top)","1 slice light tasty cheese","1 tbsp Nando's Perinaise / other low-cal sauce","Salad veg of choice","100g sweet potato (raw weight)","1 tsp olive oil, to coat","Salt, garlic, paprika to season"],"method":["If using an oven, preheat to 200°C.","Cut the sweet potato into chips and microwave for 4–5 mins, or until slightly soft. Toss with the olive oil and seasoning, and bake in the oven or air-fryer for 15–20 minutes until crisp, turning halfway.","Season the chicken with the Portuguese spice/paprika and cook in a pan (or grill) until cooked through.","Toast the buns, add the cheese to melt, then build with the chicken, Perinaise and salad veg.","Serve the burger with the sweet potato chips on the side."],"tip":null}]}}},"weeks":{"1":{"tag":"TEST NIGHT","test":true,"reps":8,"note":"Find your starting weight — one you can lift 8 solid times."},"2":{"reps":8,"note":"Sets of 8 at your starting weight."},"3":{"reps":7,"note":"Sets of 7 — add 2.5 kg (squat +5 kg)."},"4":{"reps":6,"note":"Sets of 6 — add another 2.5 kg (squat +5 kg)."},"5":{"tag":"TEST NIGHT","test":true,"note":"Rep-out at your Week 2 weight. Beat your Week 1 number."},"6":{"reps":8,"note":"Sets of 8 at your Week 4 weight."},"7":{"reps":7,"note":"Sets of 7 — add 2.5 kg (squat +5 kg)."},"8":{"reps":6,"note":"Sets of 6 — add another 2.5 kg (squat +5 kg)."},"9":{"tag":"OVERLOAD","reps":5,"note":"Heaviest bar of the program — +2.5 kg (squat +5 kg). Spotters on."},"10":{"tag":"REP-OUT FINAL","test":true,"note":"Rep-out at your Week 2 weight. Watch how light it feels."}},"strength":{"mon":{"label":"MONDAY","compounds":[{"name":"Bench Press","sets":4},{"name":"Overhead Press","sets":3}],"accessories":[{"name":"Machine Chest Press","sets":3,"rx":"8–10","reps":8},{"name":"Machine Shoulder Press","sets":3,"rx":"8–10","reps":8},{"name":"Pec Fly","sets":3,"rx":"10–12","reps":10},{"name":"Lateral Raise","sets":3,"rx":"10–12","reps":10},{"name":"Bicep Curls","sets":3,"rx":"8–10","reps":8},{"name":"Triceps Pushdown","sets":3,"rx":"10–12","reps":10}]},"wed":{"label":"WEDNESDAY","compounds":[{"name":"Back Squat","sets":4},{"name":"Pendlay Row","sets":3}],"accessories":[{"name":"Seated Low Row","sets":3,"rx":"8–10","reps":8},{"name":"Wide Lat Pulldown","sets":3,"rx":"8–10","reps":8},{"name":"Walking Lunges","sets":3,"rx":"20 steps","reps":20},{"name":"Hamstring Curl","sets":3,"rx":"8–10","reps":8},{"name":"Calf Raise","sets":3,"rx":"12–15","reps":12}]}},"overtime":{"a":{"label":"Overtime A","title":"Upper Body Pump","when":"Best run on Thursday or Friday. Machines and dumbbells only — nothing that steals from Monday night.","exercises":[{"name":"Incline Dumbbell Chest Press","sets":3,"rx":"10–12","reps":10},{"name":"Plate-Loaded High Row","sets":3,"rx":"10–12","reps":10},{"name":"Dumbbell Lateral Raise (standing)","sets":3,"rx":"12–15","reps":12},{"name":"Pin-Loaded Rear Delt Fly Machine","sets":3,"rx":"12–15","reps":12},{"name":"Dumbbell Hammer Curls","sets":3,"rx":"10–12","reps":10},{"name":"Cable Rope Overhead Triceps Extension","sets":3,"rx":"10–12","reps":10}]},"b":{"label":"Overtime B","title":"Legs & Core","when":"Best run on the weekend. Leave the legs fresh enough for Wednesday squats.","exercises":[{"name":"Plate-Loaded Leg Press","sets":3,"rx":"10–12","reps":10},{"name":"Dumbbell Romanian Deadlift","sets":3,"rx":"10–12","reps":10},{"name":"Machine Leg Extension","sets":3,"rx":"12–15","reps":12},{"name":"Machine Seated Calf Raise","sets":3,"rx":"12–15","reps":12},{"name":"Dumbbell Goblet Squat","sets":3,"rx":"12","reps":12},{"name":"Cable Rope Crunch (kneeling)","sets":3,"rx":"15","reps":15}]}},"finishers":[{"name":"Incline Walk","desc":"Treadmill — 12% incline, steady pace","mins":15},{"name":"StairMaster","desc":"Steady climb, hands off the rails","mins":10},{"name":"The Combo","desc":"8 min incline walk → 8 min StairMaster","mins":16}],"boxing":{"1":{"mon":{"title":"Basic Bag Work & Core","drills":["Shadow Boxing","Shadow Boxing","Open Bag Work","Open Bag Work","Backhand Start","Inside Work","Max Effort — 10 sec ON / 10 sec OFF","Max Effort — 15 sec ON / 15 sec OFF","Unders & Overs","Power Punches"],"finish":"4 minutes of core work"},"wed":{"title":"Boxing Conditioning & Core","drills":["Shadow Boxing","Shield Work","Shield Work","Partner Touch","Partner Touch","Open Bag Work","Open Bag Work","Max Effort — 10 sec ON / 10 sec OFF","Max Effort — 15 sec ON / 15 sec OFF","Max Effort — 20 sec ON / 20 sec OFF"],"finish":"4 minutes of core work"}}},"drills":{"Fundamentals":["Shadow Boxing","Open Bag Work","Backhand Start","Inside Work"],"Bag Skills":["Unders & Overs","Power Punches"],"Partner Work":["Shield Work","Partner Touch"],"Max Effort":["Max Effort — 10 sec ON / 10 sec OFF","Max Effort — 15 sec ON / 15 sec OFF","Max Effort — 20 sec ON / 20 sec OFF"]},"rewards":[{"pts":30,"name":"Free Recovery Day","desc":"Ice bath and sauna on the house, one day that week."},{"pts":60,"name":"Recovery Regular","desc":"A free recovery day every week for the rest of the program."},{"pts":100,"name":"The Coaches Owe You","desc":"A prize from the coaches. Earned, not given."}],"awards":[{"name":"Most Improved Bloke","desc":"Walked in week 1, left a different man in week 10."},{"name":"The Workhorse","desc":"Never missed a session. Not once. Not even that week."},{"name":"Golden Gloves","desc":"Handiest bloke on the bags."},{"name":"The Engine","desc":"King of the cardio challenges. Built different."},{"name":"Cheat Meal King","desc":"Loyal to the plan six days a week. Saturday is sacred and he will not be moved."},{"name":"Best Excuse","desc":"Most creative reason for missing a set. Points for imagination."},{"name":"Team Captain","desc":"Kept the boys together, on and off the floor."},{"name":"The Quiet Achiever","desc":"Said nothing. Lifted everything."},{"name":"The Yarn Spinner","desc":"More talk than reps. We love him anyway."},{"name":"First Through the Door","desc":"Never been beaten to the car park. Ever."}]};</script>
<style>
:root{
  --bg:#0b0b0c; --panel:#121214; --panel2:#18181b; --line:#26262b;
  --gold:#c9a44c; --gold-dim:#8a7136; --text:#f2f0eb; --muted:#9a9891;
  --danger:#e05252; --ok:#4bc97a;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:'Montserrat',sans-serif;overscroll-behavior-y:none}
button{font-family:inherit;cursor:pointer;border:none}
input,select,textarea{font-family:inherit}
.hidden{display:none !important}

/* ---------- AUTH ---------- */
#authScreen{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:32px 24px calc(32px + env(safe-area-inset-bottom));max-width:440px;margin:0 auto}
.brandBlock{text-align:center;margin-bottom:36px}
.brandLogo{max-width:200px;max-height:110px;margin:0 auto 14px;display:block}
.brandMark{font-family:'Oswald',sans-serif;font-weight:600;font-size:42px;letter-spacing:6px;color:#fff;line-height:1.05;text-transform:uppercase}
.brandSub{font-weight:600;font-size:12px;letter-spacing:6px;color:var(--muted);margin-top:8px;text-transform:uppercase}
.brandRule{width:56px;height:2px;background:var(--gold);margin:18px auto 0}
.authCard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:24px 20px}
.authTabs{display:flex;gap:8px;margin-bottom:20px}
.authTabs button{flex:1;padding:11px;border-radius:8px;background:transparent;border:1px solid var(--line);color:var(--muted);font-weight:700;font-size:12px;letter-spacing:2px;text-transform:uppercase}
.authTabs button.active{background:var(--gold);border-color:var(--gold);color:#161307}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.field input{width:100%;padding:13px 14px;border-radius:8px;border:1px solid var(--line);background:#0e0e10;color:var(--text);font-size:16px}
.field input:focus{outline:none;border-color:var(--gold-dim)}
.row2{display:flex;gap:10px}.row2 .field{flex:1}
.btnGold{width:100%;padding:15px;border-radius:8px;background:var(--gold);color:#161307;font-weight:800;font-size:13px;letter-spacing:2.5px;text-transform:uppercase}
.btnGold:disabled{opacity:.5}
.authMsg{margin-top:14px;font-size:13px;text-align:center;color:var(--danger);min-height:18px}
.authMsg.ok{color:var(--ok)}

/* ---------- APP SHELL ---------- */
#appScreen{min-height:100vh;padding-bottom:calc(84px + env(safe-area-inset-bottom))}
.topBar{position:sticky;top:0;z-index:20;background:rgba(11,11,12,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:calc(14px + env(safe-area-inset-top)) 18px 14px;display:flex;align-items:center;justify-content:space-between}
.topBrand{display:flex;align-items:center;gap:10px}
.topBrand img{height:30px;width:auto}
.topBrand .tbText{font-family:'Oswald',sans-serif;font-weight:600;font-size:17px;letter-spacing:4px;color:#fff;text-transform:uppercase}
.topBrand .tbText small{display:block;font-size:8.5px;letter-spacing:3px;color:var(--gold);font-weight:600}
.profileBtn{width:38px;height:38px;border-radius:50%;background:var(--panel2);border:1px solid var(--line);color:var(--gold);font-weight:800;font-size:14px;display:flex;align-items:center;justify-content:center}
main{max-width:520px;margin:0 auto;padding:20px 18px}

/* hero */
.hero{border-radius:14px;overflow:hidden;border:1px solid var(--line);background:linear-gradient(160deg,#15161a 0%,#0a0b0e 70%);padding:30px 22px;margin-bottom:20px;position:relative}
.hero::after{content:"";position:absolute;left:22px;bottom:22px;width:44px;height:3px;background:var(--gold)}
.heroKicker{font-size:11px;font-weight:700;letter-spacing:4px;color:var(--gold);text-transform:uppercase;margin-bottom:10px}
.heroTitle{font-family:'Oswald',sans-serif;font-size:30px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;line-height:1.1;margin-bottom:10px}
.heroText{font-size:13px;color:var(--muted);line-height:1.6;padding-bottom:18px}

/* section + cards */
.secTitle{font-size:12px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin:26px 0 12px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:12px}
.card h3{font-family:'Oswald',sans-serif;font-size:19px;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.card .sub{color:var(--gold);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.card p{color:var(--muted);font-size:13.5px;line-height:1.6}
.card ul{list-style:none;margin-top:10px}
.card ul li{color:#d8d5cd;font-size:13.5px;line-height:1.5;padding:5px 0 5px 22px;position:relative}
.card ul li::before{content:'';position:absolute;left:2px;top:12px;width:8px;height:8px;border:1.5px solid var(--gold);border-radius:2px;transform:rotate(45deg)}
.priceRow{display:flex;align-items:baseline;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid var(--line)}
.price{font-size:22px;font-weight:800}
.price small{font-size:13px;font-weight:500}
.priceNote{color:var(--muted);font-size:12px}
.notice{background:rgba(201,164,76,.12);border:1px solid var(--gold);border-radius:12px;padding:14px 16px;margin-bottom:14px;font-size:13px;line-height:1.5;color:#e8e2d2}
.notice b{color:var(--gold)}
.pillRow{display:flex;flex-wrap:wrap;gap:8px}
.pill{background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:7px 13px;font-size:12px;color:#d8d5cd;letter-spacing:.5px}
.pathway{display:flex;align-items:center;justify-content:space-between;gap:4px;margin:6px 0 2px}
.pathway .step{flex:1;text-align:center;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 4px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.pathway .step.goldStep{border-color:var(--gold);color:var(--gold)}
.pathway .arrow{color:var(--gold);font-size:13px}
.btnLink{display:block;width:100%;text-align:center;background:transparent;color:var(--gold);border:1.5px solid var(--gold);font-weight:800;font-size:12px;letter-spacing:2px;text-transform:uppercase;border-radius:10px;padding:13px;margin-top:6px;text-decoration:none}

/* boxing sub-tabs + sparring hub */
.subTabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
.subTabs button{flex:1 1 30%;min-width:30%;padding:11px 4px;border-radius:8px;background:transparent;border:1px solid var(--line);color:var(--muted);font-weight:700;font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase}
.subTabs button.active{background:var(--gold);border-color:var(--gold);color:#161307}
.addBtn{color:var(--gold);font-size:24px;font-weight:600;border:1px solid var(--gold-dim);border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.byoLbl{display:block;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin:14px 0 8px}
.byoLbl:first-child{margin-top:0}
.pillBtns{display:flex;gap:8px}
.pillBtns button{flex:1;padding:11px 4px;border-radius:8px;background:transparent;border:1px solid var(--line);color:var(--muted);font-weight:700;font-size:12px;letter-spacing:.5px}
.pillBtns button.on{background:var(--gold);border-color:var(--gold);color:#161307}
.miniSel{margin-top:8px;background:var(--panel2);border:1px solid var(--line);color:var(--muted);border-radius:8px;padding:8px 10px;font-size:12px;display:block}

/* legacy elite */
.eliteCard{background:linear-gradient(150deg,#1d1a12 0%,#111013 55%,#0b0b0c 100%);border:1.5px solid var(--gold);border-radius:16px;padding:28px 22px;text-align:center}
.eliteStar{width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,#a37e2c,#e6c15c);color:#241c05;font-size:26px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;box-shadow:0 0 24px rgba(230,193,92,.35)}
.elitePrice{font-size:40px;font-weight:900;color:var(--gold)}
.elitePrice small{font-size:15px;font-weight:600;color:var(--muted)}
.eliteCard ul{list-style:none}
.eliteCard ul li{color:#d8d5cd;font-size:13.5px;line-height:1.5;padding:7px 0 7px 24px;position:relative}
.eliteCard ul li::before{content:'★';position:absolute;left:0;color:var(--gold);font-size:12px;top:9px}

/* division badges + belts */
.fcPhotoWrap{position:relative;flex-shrink:0}
.dvBadge{position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);border-radius:7px;padding:4px 7px;font-family:'Oswald',sans-serif;font-size:7.5px;font-weight:600;letter-spacing:1.1px;line-height:1;white-space:nowrap;text-transform:uppercase;overflow:hidden;
  background:linear-gradient(135deg,rgba(20,20,22,.75),rgba(20,20,22,.55));
  backdrop-filter:blur(9px);-webkit-backdrop-filter:blur(9px)}
.dvBadge::after{content:"";position:absolute;top:-70%;left:-40%;width:45%;height:240%;transform:rotate(24deg);background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);animation:holoSweep 3.4s ease-in-out infinite}
@keyframes holoSweep{0%,55%{left:-45%}100%{left:135%}}
.dvPRO{color:#f3d689;border:1px solid rgba(230,193,92,.65);box-shadow:0 4px 14px rgba(0,0,0,.5),0 0 16px rgba(230,193,92,.4);text-shadow:0 0 10px rgba(230,193,92,.7)}
.dvAM{color:#eef1f5;border:1px solid rgba(217,219,224,.65);box-shadow:0 4px 14px rgba(0,0,0,.5),0 0 16px rgba(217,219,224,.35);text-shadow:0 0 10px rgba(217,219,224,.7)}
.dvFC{color:#eda963;border:1px solid rgba(205,127,50,.65);box-shadow:0 4px 14px rgba(0,0,0,.5),0 0 16px rgba(205,127,50,.4);text-shadow:0 0 10px rgba(205,127,50,.7)}
.dvSC{color:#ff9d9d;border:1px solid rgba(224,82,82,.65);box-shadow:0 4px 14px rgba(0,0,0,.5),0 0 16px rgba(224,82,82,.4);text-shadow:0 0 10px rgba(224,82,82,.7)}
.dvFIT{color:#a8d4ec;border:1px solid rgba(143,184,216,.65);box-shadow:0 4px 14px rgba(0,0,0,.5),0 0 16px rgba(143,184,216,.4);text-shadow:0 0 10px rgba(143,184,216,.7)}
.dvCOACH{color:#f5dc96;border:1px solid rgba(230,193,92,.85);background:linear-gradient(135deg,rgba(163,126,44,.5),rgba(20,20,22,.7));box-shadow:0 4px 14px rgba(0,0,0,.5),0 0 20px rgba(230,193,92,.55);text-shadow:0 0 10px rgba(230,193,92,.85)}
.dvLB{color:#f5dc96;border:1px solid rgba(201,153,77,.75);background:linear-gradient(135deg,rgba(201,153,77,.45),rgba(20,20,22,.7));box-shadow:0 4px 14px rgba(0,0,0,.5),0 0 18px rgba(201,153,77,.5);text-shadow:0 0 10px rgba(201,153,77,.8)}
.fcAcc{margin-top:16px;position:relative}
.accT{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.accList{display:flex;flex-wrap:wrap;gap:7px}
.accPill{background:rgba(255,255,255,.04);border-color:var(--gold-dim);color:#e8e2d2;font-size:11.5px}
.beltRow{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:14px;position:relative}
.belt{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:10px;padding:8px 6px 6px;text-align:center}
.belt svg{width:100%;height:auto;max-height:58px;display:block;filter:drop-shadow(0 3px 5px rgba(0,0,0,.45))}
.titleChip{cursor:pointer;border-color:var(--gold-dim);color:var(--gold)}
.belt small{display:block;font-size:8.5px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-top:4px;line-height:1.3}
.ckRow{display:flex;align-items:center;gap:10px;padding:9px 2px;font-size:13.5px;color:#d8d5cd;border-bottom:1px solid var(--line);cursor:pointer}
.ckRow:last-child{border-bottom:none}
.ckRow input{width:18px;height:18px;accent-color:#c9a44c;flex-shrink:0}

/* staff task checklist */
.ckTask{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);font-size:13.5px}
.ckTask:last-child{border-bottom:none}

function esc(s){return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

function fmtWhen(iso){const d=new Date(iso);const now=new Date();
  const sameDay=d.toDateString()===now.toDateString();

  return sameDay?t:d.toLocaleDateString("en-AU",{day:"numeric",month:"short"})+" "+t;}

function setAuthMode(m){
  authMode=m;
  $("tabLogin").classList.toggle("active",m==="login");
  $("tabSignup").classList.toggle("active",m==="signup");
  $("signupFields").classList.toggle("hidden",m!=="signup");
  $("authGo").textContent=m==="login"?"Log In":"Create Profile";
  $("authMsg").textContent="";
}
async function handleAuth(e){
  e.preventDefault();
  const email=$("authEmail").value.trim(),pass=$("authPass").value;
  const msg=$("authMsg");msg.className="authMsg";msg.textContent="";
  $("authGo").disabled=true;
  try{
    if(authMode==="signup"){
      const first=$("suFirst").value.trim(),last=$("suLast").value.trim(),phone=$("suPhone").value.trim(),dob=$("suDob").value;
      if(!first||!last||!phone||!dob){msg.textContent="Please fill in every field to build your profile.";$("authGo").disabled=false;return false;}
      const {data,error}=await sb.auth.signUp({email,password:pass,options:{data:{first_name:first,last_name:last,phone,dob}}});
      if(error)throw error;
      if(data.session){session=data.session;await ensureProfile();await enterApp();}
      else{msg.className="authMsg ok";msg.textContent="Profile created. Check your email to confirm, then log in.";}
    }else{
      const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
      if(error)throw error;
      session=data.session;await ensureProfile();await enterApp();
    }
  }catch(err){msg.textContent=err.message||"Something went wrong.";}
  $("authGo").disabled=false;return false;
}
async function ensureProfile(){
  const u=session.user;
  let {data}=await sb.from("profiles").select("*").eq("id",u.id).maybeSingle();
  if(!data){
    const md=u.user_metadata||{};
    const ins={id:u.id,email:u.email,first_name:md.first_name||"",last_name:md.last_name||"",phone:md.phone||"",dob:md.dob||null};
    await sb.from("profiles").upsert(ins);
    data=ins;
  }
  profile=data;
  $("profileBtn").textContent=((profile.first_name||"?")[0]+(profile.last_name||"?")[0]).toUpperCase();
}
async function signOut(){
  if(chatChannel){sb.removeChannel(chatChannel);chatChannel=null;}
  if(staffChannel){sb.removeChannel(staffChannel);staffChannel=null;}
  await sb.auth.signOut();session=null;profile=null;showAuth();
}

/* ---- Register For Classes (2 full days ahead) ---- */
function bookingHorizon(){
  const now=new Date();
  const end=new Date(now);
  const dow=now.getDay();
  let daysToSunday=(7-dow)%7;
  if(dow===0&&now.getHours()>=7)daysToSunday=7;
  end.setDate(end.getDate()+daysToSunday);
  end.setHours(23,59,59,999);
  return end;
}
function upcomingClasses48(){
  const now=new Date(),out=[];
  const horizon=bookingHorizon();
  for(let off=0;off<=13;off++){
    const day=new Date(now);day.setDate(day.getDate()+off);
    if(day>horizon&&off>0)break;
    const dow=day.getDay();
    CLASS_SCHEDULE.filter(c=>c.d===dow).forEach(c=>{
      const [h,m]=c.t.split(":").map(Number);
      const start=new Date(day);start.setHours(h,m,0,0);
      if(start>now&&start<=horizon)out.push({...c,start,date:isoDateLocal(day),off});
    });
  }
  return out.sort((a,b)=>a.start-b.start);
}

function byoPhases(){
  const p=[];
  byo.list.forEach((id,i)=>{
    const it=byoFind(id);if(!it)return;
    const L=byoRoundLen(it);
    const startIdx=p.length;
    const rn="Round "+(i+1)+" of "+byo.list.length+" — "+it.n;
    if(it.seg&&it.seg.work){
      let t=0,on=true;
      while(t<L){const d=Math.min(on?it.seg.work:it.seg.rest,L-t);p.push({b:on?it.seg.wl:"REST",sm:rn,s:d,k:on?"work":"rest",fl:on?"g":"r"});t+=d;on=!on;}
    }else if(it.seg&&it.seg.ladder){
      it.seg.ladder.forEach(w=>{
        p.push({b:it.seg.wl||"WORK",sm:rn,s:w,k:"work",fl:"g"});
        p.push({b:"REST",sm:rn,s:it.seg.lrest||10,k:"rest",fl:"r"});
      });
    }else if(it.seg&&it.seg.cycle){
      let t=0,j=0;
      while(t<L){const lbl=it.seg.cycle[j%it.seg.cycle.length];const d=Math.min(it.seg.every,L-t);
        p.push({b:lbl,sm:rn,s:d,k:lbl==="REST"?"rest":"work",fl:lbl==="REST"?"r":"g"});t+=d;j++;}
    }else if(it.seg&&it.seg.abcAuto){
      const ev=L===120?20:30;let t=0,j=0;
      while(t<L){const d=Math.min(ev,L-t);p.push({b:"ABC FOOTWORK",sm:rn+" · change every "+ev+"s",s:d,k:"work",fl:j%2===0?"g":"r"});t+=d;j++;}
    }else if(it.seg&&it.seg.alt){
      let t=0,j=0;
      while(t<L){const d=Math.min(it.seg.every,L-t);p.push({b:it.seg.alt[j%it.seg.alt.length],sm:rn,s:d,k:"work",fl:j%2===0?"g":"r"});t+=d;j++;}
    }else{
      p.push({b:it.n.toUpperCase(),sm:rn,s:L,k:"work"});
    }
    p[p.length-1].end=true;
    if(it.vid)for(let q=startIdx;q<p.length;q++)p[q].vid=it.vid;
    if(i<byo.list.length-1){
      const nx=byoFind(byo.list[i+1]);
      p.push({b:"REST",sm:"Next: Round "+(i+2)+" — "+(nx?nx.n:""),s:byo.rest,k:"rest",br:true});
    }
  });
  return p;
}
/* 20m Beep Test — real MSFT schedule */
const BEEP_TBL=[[8,7],[9,8],[9.5,8],[10,9],[10.5,9],[11,10],[11.5,10],[12,11],[12.5,11],[13,11],[13.5,12],[14,12],[14.5,13],[15,13],[15.5,13],[16,14],[16.5,14],[17,15],[17.5,15],[18,16],[18.5,16]];
let BT={active:false,run:false,int:null,start:0,sched:[],idx:0};
function btBuild(){const s=[];let t=0;BEEP_TBL.forEach(([sp,n],li)=>{const iv=72/sp;for(let i=1;i<=n;i++){t+=iv;s.push({t,lvl:li+1,sh:i,last:i===n});}});return s;}
function btStart(){
  clearInterval(BT.int);
  BT={active:true,run:true,int:null,start:Date.now(),sched:btBuild(),idx:0};
  beep(880,.4);
  BT.int=setInterval(btTick,100);
  renderBoxBYO();
}
function btStop(){clearInterval(BT.int);BT.run=false;const s=$("btSh");if(s&&BT.idx>0){const b=BT.sched[BT.idx-1];s.textContent="Finished at Level "+b.lvl+", Shuttle "+b.sh+". Solid effort.";}renderBoxBYO();}
function btExit(){clearInterval(BT.int);BT={active:false,run:false,int:null,start:0,sched:[],idx:0};renderBoxBYO();}
function btTick(){
  const el=$("btTime");if(!el){clearInterval(BT.int);return;}
  const now=(Date.now()-BT.start)/1000;
  while(BT.idx<BT.sched.length&&now>=BT.sched[BT.idx].t){
    const b=BT.sched[BT.idx];
    if(b.last){beep(660,.25);setTimeout(()=>beep(990,.35),260);}else beep(880,.22);
    BT.idx++;
  }
  if(BT.idx>=BT.sched.length){btStop();return;}
  const nxt=BT.sched[BT.idx];
  $("btLvl").textContent="LEVEL "+nxt.lvl;
  $("btSh").textContent="Shuttle "+nxt.sh+" · next beep in "+Math.max(0,nxt.t-now).toFixed(1)+"s";

function sToggle(){
  if(!S.phases.length)return;
  if(S.idx>=S.phases.length)sReset();
  S.run=!S.run;clearInterval(S.int);
  if(S.run){horn(.45);S.int=setInterval(sTick,1000);}
  updS();
}
function sReset(){clearInterval(S.int);S.idx=0;S.remain=S.phases.length?S.phases[0].s:0;S.run=false;updS();}
function sNextRoundStart(from){
  let j=from;
  while(j<S.phases.length&&!S.phases[j].end)j++;
  j++;
  if(S.phases[j]&&S.phases[j].br)j++;
  return j;
}
function sSkipRound(){
  if(!S.phases.length||S.idx>=S.phases.length)return;
  const j=sNextRoundStart(S.idx);
  if(j>=S.phases.length){S.idx=S.phases.length;S.run=false;clearInterval(S.int);bell();updS();return;}
  S.idx=j;S.remain=S.phases[j].s;horn(.4);toast("Skipped ahead — next round.");updS();
}
function sDropNext(){
  if(!S.phases.length||S.idx>=S.phases.length)return;
  const j=sNextRoundStart(S.idx);
  if(j>=S.phases.length){toast("Nothing left to drop — you're on the last round.");return;}
  const k=sNextRoundStart(j);
  S.phases.splice(j,k-j);
  if(S.total)S.total--;
  toast("Next round dropped from the session.");
  updS();
}
function sOneMore(){
  if(!byo.list.length)return;
  byo.list.push(byo.list[byo.list.length-1]);
  const ph=byoPhases();
  byo.list.pop();
  let starts=[0];
  ph.forEach((p,i)=>{if(p.end&&ph[i+1])starts.push(ph[i+1]&&ph[i+1].br?i+2:i+1);});
  const j=starts[starts.length-1];
  S={phases:ph,idx:j,remain:ph[j]?ph[j].s:0,run:true,int:null,total:(S.total||byo.list.length)+1};
  horn(.5);
  S.int=setInterval(sTick,1000);
  updS();
}
function sTick(){
  S.remain--;
  const p=S.phases[S.idx];
  if(p&&p.br&&S.remain===10){say("Ten seconds out");beep(980,.15);setTimeout(()=>beep(980,.15),220);}
  if(S.remain>0&&S.remain<=3)beep(880,.12);
  if(S.remain<=0){
    if(p&&p.end)bell();
    S.idx++;
    if(S.idx>=S.phases.length){S.run=false;clearInterval(S.int);if(!(p&&p.end))bell();}
    else{S.remain=S.phases[S.idx].s;if(!(p&&p.end))horn(.5);}
  }
  updS();
}
function updS(){
  const ph=$("sPhase");if(!ph)return;
  const tm=$("sTime"),sub=$("sSub"),nx=$("sNext"),go=$("sGo"),card=$("sCard");
  if(S.idx>=S.phases.length){
    if(card)card.className="timerCard";
    const vD=$("sVid");if(vD)vD.style.display="none";
    ph.textContent="DONE";ph.className="timerPhase gold";tm.textContent="0:00";
    sub.innerHTML=`Session complete · <span style="color:var(--gold);font-weight:800;cursor:pointer" onclick="sOneMore()">+ One More Round</span> · <span style="color:var(--gold);font-weight:800;cursor:pointer" onclick="byoSaveSession()">💾 Save Session</span>`;
    nx.textContent=(S.total||byo.list.length)+" rounds in the bank. Well earned.";go.textContent="Go Again";return;
  }
  const p=S.phases[S.idx];
  const vd=$("sVid");
  if(vd){
    const want=p.fl?"":(p.vid||"");
    if(want){
      if(vd.getAttribute("src")!==want){vd.setAttribute("src",want);vd.load();}
      vd.style.display="block";
      if(S.run&&vd.paused)vd.play().catch(()=>{});
    }else vd.style.display="none";
  }
  const tenOut=p.br&&S.run&&S.remain<=10;
  ph.textContent=tenOut?"10 SECONDS OUT":p.b;
  ph.className="timerPhase "+(tenOut?"amber":p.fl==="g"?"grn":p.fl==="r"?"red":(p.k==="rest"?"":"gold"));
  if(card)card.className="timerCard"+(S.run&&p.fl?(p.fl==="g"?" flashG":" flashR"):"");
  tm.textContent=p.fl?String(S.remain):fmtSec(S.remain);
  sub.textContent=p.sm;
  const n=S.phases[S.idx+1];
  nx.textContent=n?("Next: "+n.b.toLowerCase()+" · "+fmtSec(n.s)):"Final stretch";
  go.textContent=S.run?"Pause":"Start";
}

function weekKey(d){const dt=new Date(d);const day=(dt.getDay()+6)%7;dt.setDate(dt.getDate()-day);return isoDateLocal(dt);}
function myStreakWeeks(){
  if(!session)return 0;

  let cur=new Date();
  const thisWk=weekKey(cur);
  if(!weeks.has(thisWk))cur.setDate(cur.getDate()-7);
  let streak=0;
  while(weeks.has(weekKey(cur))){streak++;cur.setDate(cur.getDate()-7);}
  return streak;
}

function urlB64ToUint8Array(base64String){
  const padding="=".repeat((4-base64String.length%4)%4);
  const base64=(base64String+padding).replace(/-/g,"+").replace(/_/g,"/");
  const raw=atob(base64);const arr=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++)arr[i]=raw.charCodeAt(i);
  return arr;
}
async function getPushSub(){
  if(!("serviceWorker" in navigator)||!("PushManager" in window))return null;
  const reg=await navigator.serviceWorker.ready;
  return reg.pushManager.getSubscription();
}
async function isPushSubscribed(){
  const sub=await getPushSub();
  return !!sub;
}
async function subscribePush(){
  if(!("serviceWorker" in navigator)||!("PushManager" in window)){toast("Push notifications aren't supported on this device.");return;}
  try{
    const perm=await Notification.requestPermission();
    if(perm!=="granted"){toast("Notifications blocked — enable them in your browser settings to turn this on.");return;}
    const reg=await navigator.serviceWorker.ready;
    let sub=await reg.pushManager.getSubscription();
    if(!sub)sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlB64ToUint8Array(VAPID_PUBLIC_KEY)});
    const j=sub.toJSON();
    await sb.from("push_subscriptions").upsert({user_id:session.user.id,endpoint:j.endpoint,p256dh:j.keys.p256dh,auth_key:j.keys.auth},{onConflict:"endpoint"});
    toast("Notifications on — nice one.");
  }catch(e){toast("Couldn't turn on notifications: "+(e.message||e));}
  refreshPushToggleBtn();
}
async function unsubscribePush(){
  try{
    const sub=await getPushSub();
    if(sub){
      await sb.from("push_subscriptions").delete().eq("endpoint",sub.endpoint);
      await sub.unsubscribe();
    }
    toast("Notifications off.");
  }catch(e){toast("Couldn't turn off notifications: "+(e.message||e));}
  refreshPushToggleBtn();
}
async function togglePush(){
  const on=await isPushSubscribed();
  if(on)await unsubscribePush();else await subscribePush();
}
async function refreshPushToggleBtn(){
  const btn=$("pushToggleBtn");if(!btn)return;
  if(!("serviceWorker" in navigator)||!("PushManager" in window)){btn.textContent="🔕 Notifications not supported on this device";btn.disabled=true;return;}
  const on=await isPushSubscribed();
  const btn2=$("pushToggleBtn");if(!btn2)return;
  btn2.textContent=on?"🔕 Turn Off Notifications":"🔔 Enable Notifications";
}

function fmtChalVal(m,v){if(m.unit==="kg")return (+v)+" kg";v=Math.round(+v);const h=Math.floor(v/3600),mm=Math.floor(v%3600/60),s=v%60;return (h?h+":"+pad(mm):mm)+":"+pad(s);}
function parseTimeIn(s){const p=s.split(":").map(x=>parseFloat(x));if(p.some(isNaN))return 0;if(p.length===3)return p[0]*3600+p[1]*60+p[2];if(p.length===2)return p[0]*60+p[1];return p[0];}
function bestEntries(id){
  const m=MVM.find(x=>x.id===id);
  const rows=ptsData.entries.filter(e=>e.challenge_id===id).slice()
    .sort((a,b)=>m.unit==="kg"?(+b.value)-(+a.value):(+a.value)-(+b.value));
  const seen=new Set(),out=[];
  rows.forEach(r=>{if(!seen.has(r.user_id)){seen.add(r.user_id);out.push(r);}});
  return out;
}

async function mvmSubmit(id){
  const m=MVM.find(x=>x.id===id);
  const el=$("mvmIn-"+id);if(!el)return;
  const raw=el.value.trim();if(!raw)return;
  const v=m.unit==="kg"?parseFloat(raw):parseTimeIn(raw);
  if(!v||v<=0||isNaN(v)){toast(m.unit==="kg"?"Enter the weight in kg.":"Enter a time like 3:45.");return;}
  const prevLead=bestEntries(id)[0]||null;
  const {data,error}=await sb.from("challenge_entries").insert({user_id:session.user.id,name:myDisplayName(),challenge_id:id,value:v}).select().single();
  if(error){toast(error.message);return;}
  const beats=prevLead?(m.unit==="kg"?v>+prevLead.value:v<+prevLead.value):true;
  if(beats&&(!prevLead||prevLead.user_id!==session.user.id)){
    await awardPoints("record","record:"+id+":"+data.id,5);
    toast(prevLead?"👑 You've taken the "+m.n+" crown — +5 bonus points!":"👑 First mark on the board — crown's yours, +5 points!");
  }else if(beats){toast("You beat your own record. Crown retained.");}
  else toast("Result posted — keep chasing that crown.");
  mvmOpen=null;await loadWorld(true);mvmRefresh();
}

      const w=+mm[1],r=+mm[2];let t=0,on=true;
      while(t<180){const dd=Math.min(on?w:r,180-t);ph.push({b:on?"MAX EFFORT":"REST",sm:rn,s:dd,k:on?"work":"rest",fl:on?"g":"r"});t+=dd;on=!on;}

const LB_FRACS={"\u00bd":.5,"\u00bc":.25,"\u00be":.75,"\u2153":1/3,"\u2154":2/3,"\u215b":.125};
function lbNum(str){
  const m=String(str).match(/^(\d+(?:[.,]\d+)?)?\s*([\u00bd\u00bc\u00be\u2153\u2154\u215b])?/);
  if(!m||(!m[1]&&!m[2]))return null;
  return (m[1]?parseFloat(m[1].replace(",",".")):0)+(m[2]?LB_FRACS[m[2]]:0);
}
function lbParseItem(s){
  s=String(s).trim();
  let m=s.match(/^(\d+(?:[.,]\d+)?[\u00bd\u00bc\u00be\u2153\u2154\u215b]?|[\u00bd\u00bc\u00be\u2153\u2154\u215b])\s*(g|kg|ml|l|tsp|tbsp|cups?|scoops?)\b\s*(.*)$/i);
  if(m){
    let unit=m[2].toLowerCase();if(unit==="cups")unit="cup";if(unit==="scoops")unit="scoop";
    let name=(m[3]||"").replace(/^\((?:[^)]*)\)\s*/,"").trim()||s;
    return {qty:lbNum(m[1]),unit,name,div:true};
  }
  m=s.match(/^(\d+)\s*(?:x|\u00d7)?\s+(.+)$/i);
  if(m)return {qty:parseInt(m[1],10),unit:"",name:m[2].trim(),div:false};
  return {qty:1,unit:"",name:s,div:false};
}
function lbFmtQty(q){
  const whole=Math.floor(q+1e-6),fr=q-whole;
  const G=[[.25,"\u00bc"],[1/3,"\u2153"],[.5,"\u00bd"],[2/3,"\u2154"],[.75,"\u00be"]];
  for(const [v,g] of G)if(Math.abs(fr-v)<.03)return (whole?whole:"")+g;
  if(fr<.03)return String(whole);
  return String(Math.round(q*10)/10);
}

function lbShopListHtml(){
  const p=LB_DATA.plans[lbPlan];
  const totals={};let any=false;
  const add=(itemStr,times)=>{
    if(!times)return;any=true;
    const q=lbParseItem(itemStr);
    const key=((q.div?"d":"c")+"|"+q.unit+"|"+q.name).toLowerCase();
    if(!totals[key])totals[key]={qty:0,unit:q.unit,name:q.name,div:q.div};
    totals[key].qty+=q.qty*times;
  };
  p.meals.forEach((meal,mi)=>{
    meal.options.forEach((o,oi)=>{
      if(/^or pick/i.test(o.name))return;
      const t=shopGet(lbPlan+":m"+mi+":o"+oi);
      o.items.forEach(it=>add(it,t));
    });
    if(meal.build)Object.entries(meal.build).forEach(([cat,items])=>{
      items.forEach((it,ii)=>add(it,shopGet(lbPlan+":m"+mi+":b:"+cat+":"+ii)));
    });
  });
  const rcats=p.recipes&&!Array.isArray(p.recipes)?p.recipes:{"Recipes":p.recipes||[]};
  Object.values(rcats).forEach(list=>list.forEach(r=>{
    const t=shopGet(lbPlan+":rec:"+r.name);
    if(t)(r.ingredients||[]).forEach(it=>add(it,t));
  }));
  (lbShopData.custom||[]).forEach(c=>add(c.name,c.count));
  if(!any)return '<div class="emptyMsg">Tap the + buttons above — every tap is one meal that week, and your shopping list builds itself here.</div>';
  const rows=Object.values(totals).sort((a,b)=>a.name.localeCompare(b.name));
  const groups={};
  rows.forEach(t=>{const a=lbAisle(t.name);(groups[a]=groups[a]||[]).push(t);});
  return LB_AISLES.map(([aisle])=>{
    const list=groups[aisle];if(!list||!list.length)return "";
    return `<p style="font-size:10px;font-weight:900;letter-spacing:2px;color:var(--muted);margin:14px 0 2px">${aisle.toUpperCase()}</p>`+list.map(t=>{
      let qty=t.qty,unit=t.unit,label;
      if(t.div){
        if(unit==="g"&&qty>=1000){qty=Math.round(qty/10)/100;unit="kg";}
        if(unit==="ml"&&qty>=1000){qty=Math.round(qty/10)/100;unit="L";}
        if(unit==="cup"&&qty>1.001)unit="cups";
        if(unit==="scoop"&&qty>1.001)unit="scoops";
        label=lbFmtQty(qty)+" "+unit;
      }else label=lbFmtQty(qty)+" \u00d7";
      return `<div class="weekRow"><span>${esc(t.name)}</span><b style="color:#c9994d;flex-shrink:0">${label}</b></div>`;
    }).join("");
  }).join("");
}

{t:"Start Here",sub:"Mindset. The restrict-binge cycle, 80/20, and your weekly calorie budget.",quick:false,md:`### This Is Not A 'Diet'

Most blokes have done a diet before. You go hard, you white-knuckle it, you drop some weight, and then life happens — a weekend away, a rough week at work, a birthday — and it all falls over. Then you feel like you've failed, so you write the whole thing off and go back to how you were eating before. Sometimes worse.

That's not just a willpower problem. That's what happens when a plan has no room in it for real life.

We're not doing that. Over the next 10 weeks we're building the structure for a way of eating you can adopt and still be getting results from long term — not something you survive for 10 weeks and then quit.

### The Cycle We're Breaking

Here's the trap most blokes are stuck in, and it's worth naming so you can spot it:

You decide to get serious. You cut right back — skip breakfast, tiny lunch, no snacks, be 'good'. By 4pm you're starving and running on fumes. You hold on through dinner. Then Friday comes, or a bad day, or the pub, and you absolutely demolish everything in sight. Then you feel guilty, so Monday you cut back even harder.

> Restrict → starve → binge → guilt → restrict harder. Round and round.

The bingeing isn't the problem. The bingeing is the symptom. The restriction caused it.

This program is not about restriction for results. We eat enough of the right foods, while still reaching sustainable targets, we eat regularly, we prioritise protein and fibre so you're actually full, and we deliberately make room for food to really be enjoyed. Not as a cheat. As part of the plan.

### The Two Ideas That Make This Work

**1. The 80/20 Rule**

Around 80% of what you eat should be whole, nutritious food — think lean meats, fish, eggs, veg, fruit, whole-grains, etc. The stuff that fills you up, makes you feel good and helps you function at your best.

The other 20% — gets to be spent on foods you really enjoy (soul food). A beer with the boys. A parmy. A slice of your kid's birthday cake.

That 20% isn't a failure or a cheat. For most of us, it's the bit that makes the other 80% sustainable. A plan you can't live with is a plan you'll quit. Knowing the best ways to incorporate this 20% is a game changer.

> You don't need to be perfect. You need to be consistent with what supports your goals. They're not the same thing.

**2. Calories Work As A Weekly Budget**

Think of it like money. If your daily target is 2,400 calories, your weekly budget is about 16,800.

If Friday turns into a big one — a few beers, a burger, dessert — you haven't 'blown it'. You've spent more from the same budget. To account for this, you could slightly reduce total calories from the other days in your week (e.g. by trimming a snack here and there / reducing portion sizes & increasing your veg), and your weekly calories still even out — OR you could also get familiar with some smart swaps to choose while you're out that help you spend less out of your calorie budget, with the same amount of enjoyment.

Kill the all-or-nothing mindset. One big day does not ruin a week. It never has. What matters is the total, and what you do most of the time.

> Overspend one day, balance it across the week. Simple as that.

### What We Actually Want From You

- **Eat enough.** Skipping entire meals isn't discipline, it's a setup for a binge later.
- **Hit your protein.** It keeps you full, protects your muscle, and it's the thing most blokes under-eat.
- **Get your fibre.** Veg, fruit, wholegrains. It keeps you full. It supports a healthy body, and keeps things moving.
- **Don't cut out food groups.** Carbs aren't the enemy. Fat isn't the enemy. You need both.
- **Aim for consistency, not perfection.**

### If You Take One Thing From This Page

**It's what you do most of the time that drives results — not what you do perfectly for a fortnight.**

You will have a bad day. You'll have a big weekend. That's not the plan failing — that's life, and our goal is to help you understand how to work with it, so you can easily get back on track and enjoy a lifestyle that actually gets you results.`},
{t:"How To Use Your Fuel Plan",sub:"The read-me. AND/OR, raw vs cooked weight, swapping meals, free sauces, cooking oils.",quick:false,md:`### Picking Your Plan

There are four plans — A, B, C and D. They're not levels and you don't work through them. They're a dial.

| | Plan A | Plan B | Plan C | Plan D |
|---|---|---|---|---|
| Daily calories | ~3000 kcal | ~2700 kcal | ~2400 kcal | ~2100 kcal |
| Protein | ~220g | ~198g | ~176g | ~154g |
| Carbohydrates | ~314g | ~282g | ~251g | ~220g |
| Fats | ~96g | ~87g | ~77g | ~67g |

These are average targets — you don't need to hit them to the gram. Protein is the one worth chasing; the rest will fall into place if you follow the plan.

Use the calorie calculator in your app to help you figure out which plan to start on. Remember calorie counters always act as a guide, and your specific needs can require a little bit of trial and error.

**Start on your suggested plan, then adjust — that's the whole point**

- Losing weight too fast, always starving, low energy? Move UP a plan (e.g. C → B).
- Not seeing any change after 2–3 weeks of being consistent? Move DOWN a plan (e.g. B → C).
- Feeling good and progressing? Stay put.

> You're not meant to climb down the plans over 10 weeks. You sit where you need to sit, and move if you need to move.

Give any change 2–3 weeks before you judge it. Weight fluctuates day to day — remember there are multiple reasons: water, food in your gut, sleep, recovery, digestion etc. Significant, quick changes in weight are not changes in fat.

### Reading The Plan

**AND / OR**

- OR means pick ONE. "250g chicken OR 200g beef" = you have one of them, not both.
- AND means include both.

In the Build Your Own sections, you choose ONE protein, ONE carb and ONE fat from lunch & dinner. Not one of each option listed — one from each category.

**Raw weight vs cooked weight**

This matters more than you'd think — meat can lose 25% of its weight when cooked, and rice more than doubles when cooked. Weigh it the way the plan says.

- Raw weight = weigh it BEFORE you cook it (generally meat and fish is listed raw).
- Cooked weight = weigh it AFTER it's cooked (some rice options are listed cooked).

If you get these mixed up you can easily be 200+ calories out without realising.

**Cooking methods & oils**

Boiling, steaming, air-frying and baking are great ways to cook without adding calories.

If you're frying, be mindful of how much oil you use — the oil in your plan has ALREADY been accounted for, and it adds up extremely quickly. A generous glug straight from the bottle can easily be 200+ calories on its own.

- Measure your oil with a spoon rather than pouring it straight into the pan.
- Use an oil spray where you can — a few sprays instead of a tablespoon can save you 100+ calories.
- A good non-stick pan means you need barely any oil at all.

**Unlimited veg**

Salad and non-starchy vegetables (like tomatoes, cucumbers, onions, capsicums — the list goes ON) are extremely low in calories. Load up. They're really important to eat enough of, and the best way to make a meal bigger and keep you full. (Potato and sweet potato are starchy carbohydrates, and are prescribed per weight in the plan.)

### Swapping Things Out

Your plan gives you a daily calorie and macro target. That's the most important aspect when it comes to weight loss and weight gain — not eating the exact meals we've listed.

The meal guide is designed to help you achieve a balanced day of eating to help you feel your best while getting results.

However, you can absolutely:

- Swap a meal for a pre-packed one (My Muscle Chef, Youfoodz, Chefgood, etc.) — just match the calories and where possible add some frozen veggies or salad.
- Build your own meal from scratch.
- Repeat the same meals and snacks multiple days in a row if that's easier for you.
- Eat the recipes in whatever slot suits — lunch and dinner are interchangeable.

> Whatever you swap in: prioritise protein, veggies (fibre!), and keep roughly 80% of it whole food.

### 'Free' Flavour — Use It

Bland food is why diets fail. These add flavour for next to no calories:

- Herbs, spices, garlic, chilli, pepper — unlimited, go nuts
- Tomato salsa
- Sriracha / Tabasco
- Low-sodium soy sauce
- Lemon or lime juice
- Mustard
- Sugar-free BBQ or tomato sauce
- Nando's Perinaise or 99% fat-free mayo
- Low-sugar sweet chilli
- Fro-Pro and Mingle sauces
- Praise French Fat Free Dressing

Just be sensible — a tablespoon is seasoning, half a bottle is a meal.

### Drinks

- Water: aim for a minimum of 2.5–3L a day. Helps with hunger, energy and recovery.
- Tea and coffee are fine. If you're having more than one a day, use skim or almond milk and swap sugar for sweetener.
- Soft drink or energy drinks: go zero-sugar.
- Alcohol: not banned — however, strongly recommended to keep to a minimum. Alcohol can pause fat-burning, increase appetite, lower inhibitions regarding food choices, and disrupt sleep.

See the Real Life guide for enjoying in moderation.

### A Few Notes

- The goal is not to weigh everything forever, however it is super important to do initially. By the end of the program you'll get a much better feel for what a portion of different foods actually looks like, then you'll be better at eyeballing it.
- These plans aren't individually prescribed — they're a well-balanced guide. For personalised nutrition support, you can book in with Alison. If you have a medical condition or need clinical dietary management, we'd recommend seeing an Accredited Practising Dietitian.`},
{t:"The Why",sub:"Why protein, why fibre, how fat loss actually works, the plate method.",quick:false,md:`### How Fat Loss Actually Works

You lose fat when you use more energy than you eat. That's it. That's the whole mechanism.

Not cutting carbs after 6pm.. or any meals or food groups. It's simply in Energy in versus energy out, over time.

Which means technically you could lose weight eating nothing but lollies if you stayed under your calories. You'd feel pretty average, be pretty hungry, and end up losing muscle along with the fat — but the scale would drop.

> Overall calories decide whether you lose weight. Food quality decides how good you feel while you do it — and whether you can keep it up.

That's why we're not just handing you a calorie number. We're building meals that keep you full, keep your energy up, and keep your muscle on.

**How big should your deficit be if you're aiming for fat-loss?**

About 300–500 calories below your maintenance. That's roughly 0.5–1kg of fat loss a week, which is a good, sustainable rate. (If you want to gain muscle, the same surplus of 300–500 cals above maintenance is a good aim.)

Drop a lot more calories than that and you can start burning muscle along with fat, energy is more likely to tank, training to suffer, and you risk getting so hungry you eventually crack. A sustainable rate is the best bet.

For reference: 1kg of body fat is about 7,700 calories. It takes time. There's no way around that.

### Protein — The One Most Blokes Get Wrong

**Why it matters**

- It keeps you FULL. Protein is the most filling of the three macros. Blokes who hit their protein are less likely to get the 4pm raid-the-pantry feeling.
- It protects your muscle. When you're in a deficit your body looks for things to burn. (And if you're looking to build muscle — you need enough for it to grow!) Enough protein (plus lifting) tells your body to burn fat & keep the muscle.
- More muscle = higher metabolism. Muscle burns energy just existing. It's why blokes who lift and eat protein find it easier to stay lean.
- It repairs you. You're training twice a week plus weights. Protein is what rebuilds you afterwards.

**How much**

We're aiming for around 1.6–2.2g per kg of your bodyweight. For most blokes that's somewhere between 150g and 220g a day — which is exactly what your plans are built around.

That's more than you think. It's why virtually every meal in your plan is anchored around a solid protein source, and why the snacks are things like YoPro, jerky and protein bars rather than a muesli bar (unless our snack is prior to training in the afternoon, where carbohydrates are favoured to fuel your session).

### Fibre — The Underrated One

It's boring to talk about... but it does so much work.

- It fills you up for barely any calories — veggies are the ultimate example.
- It slows digestion, so you stay full longer and reduce energy crashes.
- It keeps your gut healthy and, bluntly, keeps you regular.

Where to get it: vegetables, fruit, wholegrain bread and pasta, oats, beans, potatoes with the skin on. Aim for veg at both lunch and dinner and a piece of fruit or two through the day.

### Why You Don't Skip Meals

It feels productive. Skip breakfast, save 600 calories, get ahead. Right? Well whilst that does work in some cases, for some people...

What usually happens is this: you arrive at lunch ravenous and eat more than you would have. Or you hold out, and then absolutely destroy the pantry at 9pm. Almost nobody 'saves' those calories — they just move them, and usually end up adding a whole heap on top.

> Eating too little can be the fastest way to end up eating a whole lot more.

Eating regular meals with protein and fibre keeps your hunger flat and predictable. That's what helps make a plan easier to follow long term. It's not weakness to eat — it's the strategy.

### Carbs And Fat Are Not The Enemy

**Carbs**

Carbs are fuel. If you're training at 7:45pm after a full day's work — you need them. Cut them out and your sessions turn to mush, you feel flat, and you're miserable. They're roughly 40–50% of your daily intake for a reason.

**Fat**

You need fat for your hormones (including testosterone), for absorbing vitamins, and for feeling satisfied by your food. But it's calorie-dense — more than double carbs or protein per gram — so the portions are smaller. That's why the plan gives you a specific fat serve rather than being open-ended.

**Cutting out an entire food group is how you end up hating your plan and quitting it. We're not doing that.**

### The Plate Method (When You're Not Weighing)

Eating out, at a mate's, or trying to pop something together on the fly? Use this:

| Portion | What goes there |
|---|---|
| ½ your plate | Vegetables and salad |
| ¼ your plate | Protein — meat, fish, chicken, eggs |
| ¼ your plate | Carbs — rice, potato, pasta, bread |
| Thumb-size | Fat — oil, avocado, cheese, nuts |

- Training day? Nudge the carbs up a bit.
- Rest day? Nudge the veg up instead.

### Calories vs Kilojoules

Aussie labels mostly use kilojoules. Quick conversion:

- Kilojoules ÷ 4 = calories (roughly)
- Calories × 4 = kilojoules (roughly)

So a 2,000kJ meal is about 500 calories. Handy at the servo and on menu boards etc.`},
{t:"Real Life",sub:"Fast food, servo, pub, eating out — the principles.",quick:false,md:`Fast food, servos, the pub, and eating out. Because you live in the real world.

None of this is off-limits. The goal isn't to avoid these places entirely — it's to walk in knowing what to order so you can get on with your life without derailing your week.

### Three Rules That Make A Difference

You don't need to memorise a hundred menu items. Here's three rules to lean on:

**1. Find the protein (and bonus if you can get some veg too!)**

Grilled chicken, beef, fish, eggs. Order the thing built around a decent protein and it'll help you feel more satisfied. If you manage to get some veggies, fill up on those first — they'll help you feel more full for very little calories.

**2. Grilled beats crumbed / fried, every time**

Crumbed, battered and fried food soaks up oil — the same piece of chicken can double in calories. If there's a grilled version, try to order that instead.

**3. Sides and sauces add up!**

A grilled burger might be 500 calories. Add large chips and a full-sugar drink and you can easily add another 700 without touching the burger. Especially if you've got yourself a few cheeky dips or sauces as well...

### Fast Food — Smart Swaps

Rough guide. Menus change, so check the app or the board on the wall — most places list kilojoules now (÷4 for calories).

**Brekky (Maccas, Hungry Jack's, cafés)**

- Best bet: a Bacon & Egg McMuffin (~290 cal, 17g protein) with a skim cappuccino or a long black. Solid protein, sensible calories
- Want more protein? The Double Bacon & Egg McMuffin is only ~320 cal — barely more calories, noticeably more protein. Great value
- Also good: a poached egg on toast at a café — ask for a second egg to bump the protein, and add tomato/spinach/mushroom on the side
- Coffee: skim flat white, cappuccino or a long black. A large full-cream mocha with syrup can hit 400+ cal on its own
- Skip: hash browns (they add up fast), and the big 'deluxe' brekky rolls
- Skip: the muffin / banana bread / croissant at the café counter — high calorie, low protein, hungry in an hour
- Careful: a large iced coffee or frappé can be 500+ calories. That's a dessert, not a coffee

**Chicken shops (Grill'd, Nando's, Oporto, El Jannah)**

- Best bet: grilled chicken burger, or a quarter chicken with salad instead of chips
- A grilled chicken burger sits around 500 cal — that fits a lunch slot almost as-is
- Skip: crumbed/fried fillets, extra mayo, large chips
- Ask for extra salad — great volume, keeps you full

**Burgers (Maccas, Hungry Jack's, Grill'd)**

- Best bet: a plain single burger + a side salad, or a grilled chicken option
- Double the protein portion instead of multiple burgers — more protein to help you feel more satisfied, without the extra sauces etc
- Skip: the meal deal auto-pilot. The chips and full-sugar drink are usually more calories than the burger
- Always: zero-sugar drink. No downside!

**Mexican (Guzman y Gomez, Zambrero)**

- Best bet: a burrito BOWL (no tortilla) with chicken, beans, salsa, lettuce — genuinely one of the best fast-food options going
- Load the salsa and veg, go easy on cheese, sour cream and guac (all three at once adds up fast)
- Skip: nachos, and adding chips on the side

**Kebabs & charcoal chicken**

- Best bet: chicken kebab, loaded with salad, garlic sauce on the side or go light
- Even better: a kebab plate with salad instead of chips
- Skip: the Snack Pack. It's a full day's calories in a box

**Pub food**

- Best bet: a grilled steak/chicken with veg and a small side of chips or mash
- Pub trick: order the steak or grilled fish with salad and veg, and grab a few of someone else's chips rather than a whole serve of your own
- Skip: the massive parmy AND the schnitzel AND the chips AND the beers all in one sitting. Pick your battles

### The Servo

You're on the road, you're starving!

**Grab these**

- Beef jerky — high protein, keeps forever, actually filling
- YoPro or high-protein yoghurt / pudding
- Protein bar (Carman's, Quest) — check it's actually high protein, not a muesli bar in disguise
- Boiled eggs, if they have them
- A banana or a piece of fruit
- Sushi (chicken or tuna roll)
- Cheese and crackers pack
- Rokeby / Pauls protein milk / flavoured milk with high protein

**Leave these**

- The pie and the sausage roll. High calorie, low protein, hungry again in an hour
- Chips, chocolate bars, lollies — these are 20% food, but they add up so quickly, especially if you're starving
- Full-sugar energy drinks and soft drinks

### Alcohol

Nobody's telling you what you can and can't drink. But most blokes genuinely don't know what's in the glass, and alcohol is one of the most common reasons progress stalls without anyone understanding why.

It has 7 calories per gram — nearly as much as pure fat, and almost double carbs or protein. And unlike food, it gives you nothing back: no protein, no fibre, no vitamins. Just energy.

Worth knowing too: a schooner of full-strength isn't one standard drink — it's about 1.6. A pint is over 2. Most people are drinking more than they think.

**But usually, it's not the drinks**

When a night out sets someone back, the alcohol is rarely the main culprit. A few schooners is around 600 calories — that's the part everyone thinks about, and on its own it's manageable.

It's what happens around it:

- You didn't eat properly beforehand, so you're starving by the second drink.
- Alcohol torches your willpower — the chips on the bar, the shared plate, the "may as well".
- Then the late-night feed on the way home. A large HSP is 1,500+ calories on its own.
- Then you sleep badly, so Sunday you're wrecked, you skip training, and you eat like it.

> The beers were 600 calories. The night around them can easily cost 3,000 — and most of it isn't the beer.

**That's the honest picture. It's not that one drink ruins your week. It's that drinking makes every other decision that night worse, and the day after is usually more damaging than the night itself.**

**If you're going out**

- Eat a solid, protein-heavy meal BEFORE you go. Drinking on an empty stomach is how the kebab happens.
- Alternate with water. Fewer drinks, fewer calories, better sleep — and you might actually train tomorrow.
- Decide what you're eating on the way home before you leave. A kebab with salad beats a large HSP by over 1,000 calories.

> The honest version: the less you drink, the easier all of this gets. If you're drinking most nights and nothing's moving, that's very likely your answer.

For what's actually in each drink, and the standard drinks behind it — see The Alcohol Sheet.

### Eating Out — The Quick Version

- Look for: grilled, roasted, baked, steamed, or 'in a light sauce'
- Be wary of: crispy, crumbed, battered, creamy, buttery, glazed, 'smothered'
- Ask for sauce and dressing on the side — you'll use half without noticing
- Swap chips for salad or veg. Most places will do it
- If it's a big night out and you WANT the parmy — have the parmy. When you're in a fat loss phase, just try to budget for it and move on. That's the 20%.

### Want The Specific Orders?

**This guide gives you the principles. For the exact thing to order at Maccas, KFC, Subway, GYG, Grill'd and the servo — with the calories and protein — see Know Your Order.**

That's the one to keep on your phone.`},
{t:"When It Goes Sideways",sub:"“I overate” · “the scale went up” · “I’m always hungry” · “nothing’s happening”.",quick:false,md:`Read this when something's gone wrong. Because it will, and that's normal.

Every bloke on this program will have a bad day, a bad week, or a moment where they think about packing it in. The blokes who get longer-term results aren't the ones who never slip — they're the ones who know what to do next.

### "I Overate. I've Blown It."

You probably haven't.

Let's do the maths. Say you went 1,000 calories over on Saturday. That's genuinely a big blowout. Spread across your week, that's about 140 calories a day — one snack. You could trim that without even trying, and your week lands almost exactly where it should.

One meal isn't going to ruin everything. One week isn't going to undo 10. Fat gain works exactly like fat loss — slowly, and only over time.

> The damage isn't the big meal. The damage is deciding you've ruined it, writing off the rest of the week, and eating badly for multiple days after.

**What to do:**

- Nothing dramatic. Don't skip meals tomorrow to 'make up for it' — that's the restrict-binge cycle starting again.
- Just go back to normal at your very next meal. Not Monday. The next meal.
- If you want, trim a snack from the next few days or slightly reduce your portion size from a couple of main meals. That's it.

### "The Scale Went Up."

Your weight can swing 1–2kg in a day and have nothing to do with fat.

What actually moves the number day to day:

- Salt (a big meal out will hold water for a couple of days)
- Carbs (every gram of stored carb holds water with it)
- How recently you trained (sore muscles hold fluid)
- Whether you've been to the toilet
- Alcohol, stress, poor sleep etc

**To gain 1kg of actual fat you'd need to eat about 7,700 calories MORE than you burnt. That's not going to happen in just one big dinner.**

**What to do:**

- Try to weigh yourself the same day, same time, same conditions.
- Look at the trend over 2–3 weeks and more, don't stress over the day to day changes.
- Don't forget — use the mirror, your clothes, your belt, your lifts and your energy. The scale is one data point, not the whole story.

### "I'm Always Hungry."

Being a bit hungry sometimes is completely normal in a deficit. Being hungry ALL the time is a sign something's off — but before you panic:

**Run through this list:**

- Are you actually hitting your protein? Under-eat protein and you're likely to be hungry no matter how many calories you eat.
- Are you eating enough veg? Volume matters. A meal with a big pile of veg feels like a meal. One without doesn't.
- Are you constantly skipping meals or snacks to 'save' calories?
- Are you drinking enough water? You'd be surprised how easily thirst gets mistaken for hunger.
- Are you sleeping? Poor sleep messes with your hunger hormones — you'll be hungrier and crave rubbish.
- Are you on the right plan? If you're a big bloke on Plan D, you might be undereating. Have a chat with Ali. Move up.

> If you've checked all that and you're still starving — move up a plan. Being on a plan you can stick to beats being on a lower one you'll quit.

### "Nothing's Happening. I'm Not Losing Weight."

First — how long has it actually been? Give any change 2–3 weeks of genuine consistency before you judge it.

**If it's genuinely been 2–3+ weeks of doing it properly:**

- Be honest about the weekend. Most 'plateaus' are five good days and two that undo them. The plan doesn't know it's Saturday.
- Be honest about the drinks. Alcohol is invisible calories and it adds up fast.
- Be honest about the little stuff. Handfuls of the kids' chips, a bite of this, oil in the pan, sauces. It's easy to add 300+ calories a day without noticing.
- Then, if all that's genuinely in order — move down a plan (e.g. B → C).

Not a judgment, just maths. This isn't about being 'bad' — it's about getting accurate.

### "I've Had A Shocker Of A Week."

Work blew up. Kids were sick. You ate takeaway four nights and didn't train when you wanted to. It happens to everyone.

Here's what NOT to do: decide you've failed, feel guilty, and either quit or try to punish yourself with an extreme week to 'make up for it'. That's the cycle, and it always ends the same way.

**What to do:**

- Draw a line under it. It's done. It doesn't carry over.
- Don't try to be extra good this week to compensate. Just be normal so you avoid a vicious cycle.
- Start with ONE thing — get your protein in at breakfast. Momentum builds from small wins.
- Come to training. Even if you feel like a fraud. Especially then!

### "I Feel Like I'm Doing This Alone."

You're not. Every bloke in that room has had the same thoughts you're having right now, and most of them haven't said it out loud either.

- Ask. That's what the nutrition support is there for — use it. There's no stupid question, and if you need individualised help, you're welcome to book in for it.
- Talk to the blokes training next to you.
- If you feel like your plan genuinely doesn't fit your life, say so. We're here to help and we'd rather make adjustments that work for you, than have you quietly give up on it.

### The One Thing To Remember

**Consistency beats perfection. Every single time.**

A bloke who eats well 80% of the time for 10 weeks will get further than a bloke who's perfect for 12 days and then quits. You're not trying to be flawless. You're trying to be someone who keeps using the tools they have, and keeps showing up.`},

function lbMd(md){
  const esc2=t=>t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const inline=t=>esc2(t).replace(/\*\*([^*]+)\*\*/g,"<b style=\"color:#f5f5f5\">$1</b>");
  const lines=md.split(/\r?\n/);let out="",i=0;
  while(i<lines.length){
    const L=lines[i];
    if(!L.trim()){i++;continue;}
    if(/^###\s/.test(L)){out+='<h3 style="color:#c9994d;font-size:14.5px;letter-spacing:.5px;margin:18px 0 6px">'+inline(L.slice(4))+"</h3>";i++;continue;}
    if(/^##\s/.test(L)){out+='<h2 style="color:#c9994d;font-size:19px;letter-spacing:.5px;margin:20px 0 8px">'+inline(L.slice(3))+"</h2>";i++;continue;}
    if(/^>\s?/.test(L)){let buf=[];while(i<lines.length&&/^>\s?/.test(lines[i])){buf.push(inline(lines[i].replace(/^>\s?/,"")));i++;}
      out+='<div style="border-left:3px solid #c9994d;background:#161310;border-radius:0 10px 10px 0;padding:10px 12px;margin:12px 0;font-size:13px;line-height:1.65;color:#e8e8e8">'+buf.join("<br>")+"</div>";continue;}
    if(/^\|/.test(L)){let rows=[];while(i<lines.length&&/^\|/.test(lines[i])){rows.push(lines[i]);i++;}
      const cells=r=>r.replace(/^\||\|$/g,"").split("|").map(c=>inline(c.trim()));
      let html='<div style="overflow-x:auto;margin:12px 0"><table style="width:100%;border-collapse:collapse;font-size:12.5px">';
      rows.forEach((r,ri)=>{ if(/^\|[\s:-]+\|/.test(r)&&/^[\s|:\-]+$/.test(r))return;
        const tag=ri===0?"th":"td";
        html+="<tr>"+cells(r).map(c=>"<"+tag+' style="text-align:left;padding:7px 9px;border-bottom:1px solid #2a2417;'+(tag==="th"?"color:#c9994d;font-size:11px;letter-spacing:1px;text-transform:uppercase":"color:#e8e8e8")+'">'+c+"</"+tag+">").join("")+"</tr>";});
      out+=html+"</table></div>";continue;}
    if(/^[-*]\s/.test(L)){let buf=[];while(i<lines.length&&/^[-*]\s/.test(lines[i])){buf.push("<li>"+inline(lines[i].replace(/^[-*]\s/,""))+"</li>");i++;}
      out+='<ul style="margin:8px 0 8px 20px;font-size:13.5px;line-height:1.8;color:#e8e8e8">'+buf.join("")+"</ul>";continue;}
    if(/^\d+[.)]\s/.test(L)){let buf=[];while(i<lines.length&&/^\d+[.)]\s/.test(lines[i])){buf.push("<li>"+inline(lines[i].replace(/^\d+[.)]\s/,""))+"</li>");i++;}
      out+='<ol style="margin:8px 0 8px 20px;font-size:13.5px;line-height:1.8;color:#e8e8e8">'+buf.join("")+"</ol>";continue;}
    if(/^!\[[^\]]*\]\([^)]+\)$/.test(L)){const im=L.match(/^!\[([^\]]*)\]\(([^)]+)\)$/);
      out+='<img src="'+esc2(im[2])+'" alt="'+esc2(im[1])+'" loading="lazy" style="width:100%;max-width:220px;border-radius:12px;margin:10px 0;display:block;border:1px solid #3a2f1b">';i++;continue;}
    out+='<p style="font-size:13.5px;line-height:1.75;color:#e8e8e8;margin:8px 0">'+inline(L)+"</p>";i++;
  }
  return out;
}
