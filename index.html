function lbcEstLabel(diff){
  const kg=diff*7/7700;
  if(Math.abs(kg)<0.12)return {txt:"hold steady",kg:0};
  return {txt:"~"+Math.abs(kg).toFixed(1)+" kg/week "+(kg>0?"down":"up"),kg};
}
function lbcRun(){
  const age=+$("lbcAge").value,h=+$("lbcH").value,w=+$("lbcW").value,gwRaw=$("lbcGw").value.trim(),gw=gwRaw?+gwRaw:null;
  if(!(age>=16&&age<=90)){toast("Punch in a real age, champion.");return;}
  if(!(h>=140&&h<=220)){toast("Height in centimetres — e.g. 180.");return;}
  if(!(w>=50&&w<=250)){toast("Current weight in kilos — e.g. 104.");return;}
  if(gw!==null&&!(gw>=50&&gw<=250)){toast("Goal weight looks off — kilos, or leave it blank to hold.");return;}
  if(!lbcJob){toast("Pick your day job — sitting, on your feet, or hard yakka.");return;}
  if(lbcExtra<0){toast("How many extra sessions a week? 0 is a fair answer.");return;}
  if(lbcExtra>0&&!lbcType){toast("Those extra sessions — mostly boxing or mostly weights? Pick one.");return;}
  const bmr=Math.round(10*w+6.25*h-5*age+5);
  const sessions=2+lbcExtra;
  const trainAdd=Math.round((2*5.5*w+lbcExtra*(lbcType||0)*w)/7);
  const tdee=Math.round((bmr*lbcJob+trainAdd)/10)*10;
  const mode=(gw===null||Math.abs(gw-w)<=1)?"hold":(gw<w?"cut":"gain");
  let target=tdee;
  if(mode==="cut")target=tdee-500;
  if(mode==="gain")target=tdee+350;
  let floored=false;
  if(target<bmr){target=bmr;floored=true;}
  target=Math.round(target/10)*10;
  let best=null;
  LBC_PLANS.forEach(p=>{
    if(!best){best=p;return;}
    const d=Math.abs(p[1]-target),db=Math.abs(best[1]-target);
    if(d<db)best=p;
    else if(d===db&&(mode==="gain"?p[1]>best[1]:p[1]<best[1]))best=p;
  });
  const bi=LBC_PLANS.findIndex(p=>p[0]===best[0]);
  if(mode==="cut"&&(tdee-best[1])*7/7700<0.15&&bi<LBC_PLANS.length-1)best=LBC_PLANS[bi+1];
  if(mode==="gain"&&(tdee-best[1])*7/7700>-0.15&&bi>0)best=LBC_PLANS[bi-1];
  const plan=best[0],planKcal=best[1];
  const planDiff=tdee-planKcal;
  const est=lbcEstLabel(planDiff);
  let goalLine="";
  if(mode==="cut"&&est.kg>0.1){
    const weeks=Math.round((w-gw)/est.kg);
    goalLine=`At that pace you're looking at roughly <b style="color:#c9994d">${weeks} weeks</b> to get from ${w} kg to ${gw} kg. Slow is fine — slow sticks.`;
  }else if(mode==="gain"&&est.kg<-0.1){
    const weeks=Math.round((gw-w)/(-est.kg));
    goalLine=`At that pace it's roughly <b style="color:#c9994d">${weeks} weeks</b> to build from ${w} kg to ${gw} kg. Quality kilos take time.`;
  }
  const modeTxt=mode==="hold"?"holding where you are":(mode==="cut"?"getting down to "+gw+" kg":"building up to "+gw+" kg");
  const bigCut=mode==="cut"&&(tdee-2100)>1000&&plan==="D";
  const cutShort=mode==="cut"&&est.kg<0.15;
  const gainShort=mode==="gain"&&est.kg>-0.15;
  $("lbcOut").innerHTML=`
    <div class="statGrid" style="margin-top:14px">
      <div class="statBox"><div class="sv">${tdee}</div><div class="sl">Maintenance kcal</div></div>
      <div class="statBox"><div class="sv" style="color:#c9994d">${target}</div><div class="sl">Your Target kcal</div></div>
      <div class="statBox"><div class="sv">${sessions}</div><div class="sl">Sessions / Week</div></div>
    </div>
    <div class="card" style="border-color:#c9994d;background:#161310;margin-top:12px">
      <div style="font-weight:900;letter-spacing:3px;color:#c9994d;font-size:10.5px">YOUR PLAN — ${modeTxt.toUpperCase()}</div>
      <h3 style="font-size:20px;margin-top:6px">Fuel Plan ${plan} — ~${planKcal} kcal</h3>
      <p style="font-size:12px;color:#9e9e9e;margin-top:4px">${esc(LB_DATA.plans[plan].macros)}</p>
      <p style="font-size:13px;margin-top:10px;line-height:1.7">Against your maintenance of ~${tdee} kcal, Plan ${plan} has you <b style="color:#c9994d">${est.txt==="hold steady"?"holding steady":est.txt.replace("~","around ")}</b>.${goalLine?" "+goalLine:""}</p>
      ${floored?`<p style="font-size:12px;color:#e0a852;margin-top:8px;line-height:1.6">We've kept you at the safe floor — going lower than this isn't the move. Have a word with the coaches before tightening further.</p>`:""}
      ${bigCut?`<p style="font-size:12px;color:#e0a852;margin-top:8px;line-height:1.6">Plan D is already a big drop for a bloke your size — expect quick movement early. Don't go under Plan D.</p>`:""}
      ${cutShort?`<p style="font-size:12px;color:#e0a852;margin-top:8px;line-height:1.6">Straight up: Plan D is our lowest plan and it sits about level with what you burn, so the scales will move slowly on food alone. Best play — run Plan D, skip the dessert serves, and add an extra session or two a week. Worth a yarn with the coaches too.</p>`:""}
      ${gainShort?`<p style="font-size:12px;color:#e0a852;margin-top:8px;line-height:1.6">You burn big numbers — Plan A on its own is only just ahead of it. Run Plan A and add an extra serve or snack from the plan each day to push the scales up. If they're not moving in a few weeks, add another.</p>`:""}
      <button class="btnGold" style="margin-top:12px;background:#c9994d" onclick="lbPlan='${plan}';lbSub='fuel';lbFuelTab='plan';renderBlokes();window.scrollTo(0,0)">Open Fuel Plan ${plan}</button>
    </div>
    <div class="secTitle">What Each Plan Does For You</div>
    <div class="card">
      ${LBC_PLANS.map(p=>{const e=lbcEstLabel(tdee-p[1]);return `<div class="weekRow" ${p[0]===plan?'style="background:rgba(201,153,77,.1);border-radius:8px;padding-left:8px;padding-right:8px"':''}>
        <span><b>Plan ${p[0]}</b> <small style="color:var(--muted)">~${p[1]} kcal</small>${p[0]===plan?' <small style="color:#c9994d;font-weight:900">← YOUR PLAN</small>':''}</span>
        <span style="color:${e.kg>0.12?'var(--ok)':(e.kg<-0.12?'#6ea8fe':'#9e9e9e')};font-weight:800;font-size:12.5px">${e.txt}</span></div>`;}).join("")}
      <p style="font-size:11px;color:#9e9e9e;margin-top:10px;line-height:1.6">Estimates, not gospel — every body runs a bit different. Weigh in once a week, same day, same time, before brekky. If the scales haven't moved the way you want after 2–3 weeks, shift one plan in the right direction and chat to the coaches.</p>
    </div>`;
  window.scrollTo({top:document.getElementById("lbcOut").offsetTop-80,behavior:"smooth"});
}

async function loadLbCoachRoster(force){
  if(lbCoachRoster&&!force)return;
  const {data:mem}=await sb.rpc("blokes_members");
  const ids=(mem||[]).map(m=>m.user_id);
  const [mpr,exr]=await Promise.all([
    ids.length?sb.from("member_profiles").select("*").in("user_id",ids):Promise.resolve({data:[]}),
    ids.length?sb.from("lb_member_extra").select("*").in("user_id",ids):Promise.resolve({data:[]})]);
  const mp=mpr.data||[],ex=exr.data||[];
  lbCoachRoster=(mem||[]).map(m=>{
    const p=mp.find(x=>x.user_id===m.user_id)||{};
    const e=ex.find(x=>x.user_id===m.user_id)||{};
    return {user_id:m.user_id,full_name:p.full_name||m.full_name||"Member",age:p.age,photo_url:p.photo_url,membership:p.membership,goal:e.goal||""};
  }).sort((a,b)=>a.full_name.localeCompare(b.full_name));
}
async function loadLbCoachDetail(uid,force){
  if(lbCoachDetail&&lbCoachDetail.user_id===uid&&!force)return;
  const [wi,ph]=await Promise.all([
    sb.from("blokes_weighins").select("*").eq("user_id",uid).order("week_of",{ascending:false}).limit(20),
    sb.from("blokes_progress_photos").select("*").eq("user_id",uid).order("week_of",{ascending:false})]);
  const withUrls=await Promise.all((ph.data||[]).map(async p=>{
    const {data}=await sb.storage.from("blokes-progress-photos").createSignedUrl(p.photo_url,3600);
    return {...p,signedUrl:(data&&data.signedUrl)||""};
  }));
  lbCoachDetail={user_id:uid,weighins:wi.data||[],photos:withUrls};
}

}

async function sparAttend(wed){

  if(!bp){toast("Build your boxer profile first.");return;}
  if(!bp.current_weight){toast("Set your current weight in your profile first — that's how we match you.");startBpEdit();return;}
  const {error}=await sb.from("spar_signups").insert({user_id:session.user.id,name:bp.name,weight:bp.current_weight,division:bp.division||"Sparring Club",week_date:wed});
  if(error&&!/duplicate/i.test(error.message)){toast(error.message);return;}
  toast("You're on the list at "+Number(bp.current_weight)+"kg. See you Wednesday.");
  renderSparWed();
}
async function sparPullOut(wed){

async function sparLockIn(){

function weightClass(kg,division){
  if(kg==null||!Number(kg))return null;
  const w=Number(kg);
  if(division==="Amateur"){
    const am=[[48,"Minimumweight"],[51,"Flyweight"],[54,"Bantamweight"],[57,"Featherweight"],[60,"Lightweight"],[63.5,"Light Welterweight"],[67,"Welterweight"],[71,"Light Middleweight"],[75,"Middleweight"],[80,"Light Heavyweight"],[86,"Cruiserweight"],[92,"Heavyweight"]];
    for(const [max,n] of am)if(w<=max)return n;
    return "Super Heavyweight";
  }
  const cls=[[48.9,"Light Flyweight"],[50.8,"Flyweight"],[52.2,"Super Flyweight"],[53.5,"Bantamweight"],[55.3,"Super Bantamweight"],[57.2,"Featherweight"],[59,"Super Featherweight"],[61.2,"Lightweight"],[63.5,"Super Lightweight"],[66.7,"Welterweight"],[69.9,"Super Welterweight"],[72.6,"Middleweight"],[76.2,"Super Middleweight"],[79.4,"Light Heavyweight"],[90.7,"Cruiserweight"]];
  for(const [max,n] of cls)if(w<=max)return n;
  return "Heavyweight";
}
const SPAR_RANKS=[[0,"Prospect"],[50,"Contender"],[150,"Main Eventer"],[300,"Title Challenger"],[600,"Champion"],[1000,"Legacy"]];
function rankOf(total){
  let cur=SPAR_RANKS[0],next=null;
  for(let i=0;i<SPAR_RANKS.length;i++){
    if(total>=SPAR_RANKS[i][0])cur=SPAR_RANKS[i];
    else{next=SPAR_RANKS[i];break;}
  }
  return {name:cur[1],at:cur[0],next:next?next[1]:null,nextAt:next?next[0]:null};
}
function weekStreak(){
  const wks=new Set(boxData.sessions.map(s=>isoDateLocal(weekStartOf(s.session_date+"T12:00:00"))));
  let n=0;
  const w=weekStartOf(new Date());
  if(!wks.has(isoDateLocal(w)))w.setDate(w.getDate()-7);
  while(wks.has(isoDateLocal(w))){n++;w.setDate(w.getDate()-7);}
  return n;
}
function topPartner(){
  const t={};
  boxData.sessions.forEach(s=>{const p=(s.partner||"").trim();if(p)t[p]=(t[p]||0)+s.rounds;});
  let best=null;
  Object.entries(t).forEach(([p,r])=>{if(!best||r>best[1])best=[p,r];});
  return best;
}

function weekStartOf(d){const x=new Date(d);const day=(x.getDay()+6)%7;x.setDate(x.getDate()-day);x.setHours(0,0,0,0);return x;}
function fmtDateAU(iso){const d=new Date(iso+"T12:00:00");return ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getDay()]+" "+d.getDate()+" "+["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][d.getMonth()];}
function sparringStatsHtml(){
  const thisWk=weekStartOf(new Date()).getTime();
  let wkRounds=0,totRounds=0,totMins=0;
  const weeks={};
  boxData.sessions.forEach(s=>{
    const w=weekStartOf(s.session_date+"T12:00:00").getTime();
    weeks[w]=weeks[w]||{r:0,m:0};
    const mins=Number(s.minutes_per_round)||0;
    weeks[w].r+=s.rounds;weeks[w].m+=s.rounds*mins;
    totRounds+=s.rounds;totMins+=s.rounds*mins;
    if(w===thisWk)wkRounds+=s.rounds;
  });
  let wkRows="";
  for(let i=0;i<10;i++){
    const w=new Date(thisWk);w.setDate(w.getDate()-7*i);
    const dd=weeks[w.getTime()];
    const lbl=i===0?"This week":i===1?"Last week":"Wk of "+w.getDate()+" "+["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][w.getMonth()];
    wkRows+=`<div class="weekRow"><span>${lbl}</span><span style="color:${dd?"var(--gold)":"var(--muted)"};font-weight:700">${dd?dd.r+" rounds · "+Math.round(dd.m)+" min":"—"}</span></div>`;
  }
  const streak=weekStreak(),riv=topPartner();
  return `<div class="secTitle">Rounds In The Bank</div>
    ${(streak>0||riv)?`<div class="pillRow" style="margin-bottom:12px">
      ${streak>0?`<span class="pill" style="border-color:var(--gold);color:var(--gold)">${streak}-week streak — keep it alive</span>`:""}
      ${riv?`<span class="pill">Top rival: ${esc(riv[0])} · ${riv[1]} rounds</span>`:""}
    </div>`:""}
    <div class="statGrid">
      <div class="statBox"><div class="sv">${wkRounds}</div><div class="sl">This Week</div></div>
      <div class="statBox"><div class="sv">${totRounds}</div><div class="sl">Total Rounds</div></div>
      <div class="statBox"><div class="sv">${Math.round(totMins)}</div><div class="sl">Total Minutes</div></div>
    </div>

function clipCardHtml(c,coachView){
  return `<div class="card">

      :`<div class="pillRow" style="margin-top:10px"><span class="pill" style="border-color:var(--gold-dim);color:var(--gold)">Awaiting coach review</span></div>`}

      <input id="cc-${c.id}" placeholder="Coach's corner notes…" maxlength="500" onkeydown="if(event.key==='Enter')saveClipComment('${c.id}')">
      <button onclick="saveClipComment('${c.id}')">➤</button></div>`

async function uploadClip(e){
  const f=e.target.files[0];if(!f)return;
  if(f.size>52428800){toast("That clip's over 50MB — trim it to the best 30–60 seconds and try again.");return;}
  const ext=(f.name.split(".").pop()||"mp4").toLowerCase().replace(/[^a-z0-9]/g,"")||"mp4";
  const path=session.user.id+"/clip-"+Date.now()+"."+ext;
  toast("Uploading your tape — hang tight, big files take a minute…");
  const {error}=await sb.storage.from("sparring-clips").upload(path,f);
  if(error){toast(error.message);return;}
  const {data}=sb.storage.from("sparring-clips").getPublicUrl(path);
  const cap=$("clipCap")?$("clipCap").value.trim():"";
  const nm=(boxData.profile&&boxData.profile.name)||(((profile&&profile.first_name)||"")+" "+((profile&&profile.last_name)||"")).trim();
  const ins=await sb.from("sparring_clips").insert({user_id:session.user.id,name:nm,video_url:data.publicUrl,caption:cap});
  if(ins.error){toast(ins.error.message);return;}
  toast("Tape's in. The coaches will take a look.");
  renderSparringClub();
}
async function saveClipComment(id){
  const el=$("cc-"+id),v=el.value.trim();if(!v)return;
  const nm=(((profile&&profile.first_name)||"")+" "+((profile&&profile.last_name)||"")).trim()||"Coach";
  const {error}=await sb.from("sparring_clips").update({coach_comment:v,coach_name:nm}).eq("id",id);
  if(error){toast(error.message);return;}
  toast("Corner notes saved.");
  renderSparringClub();
}
async function delClip(id){
  const {error}=await sb.from("sparring_clips").delete().eq("id",id).eq("user_id",session.user.id);
  toast(error?error.message:"Clip deleted.");
  renderSparringClub();
}

function coachHtml(){
  const groups={};
  boxData.allNotes.forEach(n=>{(groups[n.member_id]=groups[n.member_id]||[]).push(n);});
  const out=Object.keys(groups).map(mid=>{
    const th=groups[mid];

    const msgs=th.map(n=>`<div class="noteMsg${n.is_coach_reply?" coach":""}"><div class="who">${n.is_coach_reply?"Coach — ":""}${esc(n.author_name)}</div><div class="txt">${esc(n.body)}</div><div class="time">${fmtWhen(n.created_at)}</div></div>`).join("");
    return `<div class="card"><h3 style="font-size:15px">${esc(memberName)}</h3><div style="margin-top:10px">${msgs}</div>

  }).join("");
  const pend=(boxData.allClips||[]).filter(c=>!c.coach_comment&&c.user_id!==session.user.id);
  return `<div class="secTitle">Coach Panel — Fight Tape Review</div>

}

function wParseEx(line){
  const raw=String(line);
  const parts=raw.split(/\s+\u2014\s+|\s+-\s+/);
  const name=(parts[0]||raw).replace(/^Finisher:\s*/i,"").trim();
  const rx=(parts[1]||"").trim();
  let sets=3;
  let m=rx.match(/(\d+)\s*[\u00d7x]\s*\d+/i);                 // 3×5
  if(m)sets=parseInt(m[1],10);
  else if(/(\d+)\s*sets?/i.test(rx))sets=parseInt(rx.match(/(\d+)\s*sets?/i)[1],10);
  else if(/^\d+\s*reps/i.test(rx))sets=1;                     // "100 reps"
  m=rx.match(/(\d+)\s*[\u00d7x]\s*\d+\s*\+\s*(\d+)\s*[\u00d7x]/i);  // 2×5 + 1×5+
  if(m)sets=parseInt(m[1],10)+parseInt(m[2],10);
  sets=Math.max(1,Math.min(10,sets));
  return {name,rx:rx||"",sets,raw};
}
function wBestOf(ex){return liftLogs.filter(l=>l.exercise===ex).reduce((m,l)=>Math.max(m,+l.weight_kg),0);}
function wTodayOf(ex){const d=isoDateLocal();return liftLogs.filter(l=>l.exercise===ex&&l.session_date===d);}
function wRep(i,j,d){const el=$("wRp-"+i+"-"+j);if(!el)return;el.textContent=Math.max(0,(parseInt(el.textContent)||0)+d);}
function wExRowHtml(line,i,program,sessionName){

    ${Array.from({length:e.sets},(_,j)=>`<div style="display:flex;gap:6px;margin-top:7px;align-items:center">

    </div>`).join("")}
    <button class="btnLink" style="margin-top:8px" onclick="wLogSets('${esc(e.name)}',${i},${e.sets},'${esc(program)}','${esc(sessionName)}')">Bank ${e.sets} Set${e.sets>1?"s":""} \u2014 ${esc(e.name)}</button>
  </div>`;
}
async function wLogSets(ex,i,sets,program,sessionName){
  const rows=[];
  for(let j=0;j<sets;j++){
    const kgEl=$("wKg-"+i+"-"+j),rpEl=$("wRp-"+i+"-"+j);
    if(!kgEl||!rpEl)continue;
    const kg=parseFloat(kgEl.value),rp=parseInt(rpEl.textContent)||0;
    if(!isNaN(kg)&&kg>=0&&rp)rows.push({user_id:session.user.id,program,session:sessionName,exercise:ex,set_no:j+1,weight_kg:kg,reps:rp,session_date:isoDateLocal()});
  }
  if(!rows.length){toast("Fill in at least one set \u2014 kilos and reps.");return;}
  const {error}=await sb.from("lift_logs").insert(rows);
  if(error){toast(error.message);return;}
  toast(ex+" \u2014 "+rows.length+" set"+(rows.length>1?"s":"")+" banked.");
  await loadWLogs();
  if(view==="blokes")renderBlokes();
  else if(wpSel)renderWProgram(wpSel);else if(wsSel)renderWSingle(wsSel);else renderWeights();
}
function wHistoryHtml(program){
  const mine=liftLogs.filter(l=>!program||l.program===program);
  if(!mine.length)return '<div class="emptyMsg">No sets logged yet \u2014 punch your first numbers in above.</div>';
  const days={};
  mine.forEach(l=>{(days[l.session_date]=days[l.session_date]||[]).push(l);});
  return Object.keys(days).sort().reverse().slice(0,8).map(d=>{
    const rows=days[d];
    const byEx={};rows.forEach(r=>{(byEx[r.exercise]=byEx[r.exercise]||[]).push(r);});
    const vol=rows.reduce((a,r)=>a+(+r.weight_kg)*r.reps,0);
    return `<details class="foldCard"><summary>${fmtDateAU(d)} \u2014 ${rows.length} sets \u00b7 ${Math.round(vol).toLocaleString()} kg volume</summary>
      <div style="margin-top:6px">${Object.entries(byEx).map(([ex,list])=>`<div class="weekRow"><span>${esc(ex)}</span><span style="color:var(--gold);font-size:11.5px">${list.slice().sort((a,b)=>a.set_no-b.set_no).map(l=>l.weight_kg+"\u00d7"+l.reps).join(", ")}</span></div>`).join("")}</div>
    </details>`;}).join("");
}

function fmtSec(s){s=Math.max(0,s);return Math.floor(s/60)+":"+pad(s%60);}
function buildPhases(t){
  if(t.type==="amrap")return {p:[{l:"AMRAP",s:t.min*60}],up:false};
  if(t.type==="fortime")return {p:[{l:"WORK",s:t.cap}],up:true};
  if(t.type==="emom"){const p=[];for(let i=1;i<=t.min;i++)p.push({l:"MIN "+i+" / "+t.min,s:60});return {p,up:false};}

function loadWorkoutTimer(t){

function wtToggle(){
  if(!T.phases.length)return;
  if(T.idx>=T.phases.length)wtReset();

  updWT();
}
function wtReset(){clearInterval(T.int);T.idx=0;T.remain=T.phases.length?T.phases[0].s:0;T.run=false;updWT();}
function wtTick(){
  T.remain--;

    T.idx++;
    if(T.idx>=T.phases.length){T.run=false;clearInterval(T.int);bell();}
    else{T.remain=T.phases[T.idx].s;horn(.5);}
  }
  updWT();
}
function updWT(){
  const ph=$("wtPhase");if(!ph)return;

  const p=T.phases[T.idx];

}

function krRounds(coldS,hotS,transS,rounds,startCold){
  const p=[];
  for(let r=1;r<=rounds;r++){
    if(startCold){p.push({l:"COLD",s:coldS,r});if(hotS>0){if(transS)p.push({l:"CHANGE",s:transS,r});p.push({l:"HOT",s:hotS,r});}}
    else{p.push({l:"HOT",s:hotS,r});if(coldS>0){if(transS)p.push({l:"CHANGE",s:transS,r});p.push({l:"COLD",s:coldS,r});}}
    if(r<rounds&&transS)p.push({l:"CHANGE",s:transS,r});
  }
  p.forEach(x=>x.R=rounds);return p;

function krToggle(){

function krReset(){krIdx=0;krRemain=krP.length?krP[0].s:0;krRun=false;clearInterval(krInt);krUI();}
function krTick(){
  krRemain--;

    krIdx++;

function krUI(){

  if(!krP.length){ph.textContent="READY";ph.className="timerPhase";tm.textContent="--:--";sub.textContent="Load a protocol below to set the timer.";go.textContent="Start";return;}
  if(krIdx>=krP.length){ph.textContent="DONE";ph.style.color=KR.blue;tm.textContent="0:00";sub.textContent=krName+" — session complete. Well earned.";go.textContent="Go Again";return;}

}

const REG_WINDOW_H=24;
function upcomingClasses(){
  const now=new Date(),out=[];
  for(let off=0;off<=1;off++){
    const day=new Date(now);day.setDate(day.getDate()+off);
    const dow=day.getDay();
    CLASS_SCHEDULE.filter(c=>c.d===dow).forEach(c=>{
      const [h,m]=c.t.split(":").map(Number);
      const start=new Date(day);start.setHours(h,m,0,0);
      const diff=(start-now)/36e5;
      if(diff>0&&diff<=REG_WINDOW_H)out.push({...c,start,date:isoDateLocal(day)});
    });
  }
  return out.sort((a,b)=>a.start-b.start);
}

let amaExtra=[],amaLoaded=false,amaMsgs=[],amaRec=null;
function amaNorm(s){return s.toLowerCase().replace(/[^a-z0-9\s]/g," ").replace(/\s+/g," ").trim();}
function amaMatch(q){
  const words=amaNorm(q).split(" ").filter(w=>w.length>2);
  if(!words.length)return null;
  let best=null,bs=0;
  AMA_KB.concat(amaExtra).forEach(e=>{
    const keys=amaNorm(e.k).split(" ").filter(Boolean);
    let s=0;
    keys.forEach(k=>{if(words.some(w=>w===k||(w.length>3&&k.startsWith(w))||(k.length>3&&w.startsWith(k))))s++;});
    if(s>bs){bs=s;best=e;}
  });
  if(bs>=2)return best;
  if(bs===1&&words.length<=3)return best;
  return null;
}
async function renderAMA(){
  if(!amaLoaded){
    const {data}=await sb.from("ama_kb").select("*");
    amaExtra=(data||[]).map(r=>({k:r.keywords,a:r.answer}));
    amaLoaded=true;
  }
  if(view!=="ama")return;
  if(!amaMsgs.length)amaMsgs.push({who:"ama",txt:"G'day"+((profile&&profile.first_name)?" "+profile.first_name:"")+" — ask me about any gym-related information. Class times, booking a sauna, training programs, the coaches, prices — type it in and I'll sort you out."});
  $("main").innerHTML=`
    <button class="backBtn" onclick="go('home')">‹ Back To Home</button>
    <div class="hero" style="background:linear-gradient(160deg,#17171a 0%,#0b0b0e 75%);padding:22px">
      <div class="heroKicker">AI Information Assistant</div>
      <div class="heroTitle">Ask Me Anything</div>
      <div class="heroText">Ask me about any gym-related information.</div>
    </div>
    <div class="chatWrap" style="height:calc(100vh - 330px)">
      <div id="amaMsgs" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:4px 2px 12px">
        ${amaMsgs.map(m=>amaMsgHtml(m)).join("")}
      </div>
      <div class="chatInput">
        <input id="amaInput" placeholder="Type your question…" maxlength="300" onkeydown="if(event.key==='Enter')amaAsk()">
        <button onclick="amaAsk()">➤</button>
      </div>
    </div>`;
  const box=$("amaMsgs");box.scrollTop=box.scrollHeight;
}
function amaMsgHtml(m){
  return `<div class="msg${m.who==="me"?" mine":""}"><div class="who">${m.who==="me"?"You":"Legacy"}</div><div class="txt">${esc(m.txt)}</div></div>`;
}
function amaPush(m){
  amaMsgs.push(m);
  const box=$("amaMsgs");
  if(box){box.insertAdjacentHTML("beforeend",amaMsgHtml(m));box.scrollTop=box.scrollHeight;}
}
let amaAwait=null;
async function amaAsk(){
  const el=$("amaInput"),q=el.value.trim();
  if(!q)return;
  el.value="";
  amaPush({who:"me",txt:q});
  const me=(((profile&&profile.first_name)||"")+" "+((profile&&profile.last_name)||"")).trim()||"A member";
  if(amaAwait==="follow"){
    amaAwait=null;
    sb.from("ama_misses").insert({user_id:session.user.id,question:"FOLLOW-IN: "+me+" is coming in today on the swipe pass of "+q+"."}).then(()=>{});
    pingStaff("Swipe Pass — Follow-In",me+" is following "+q+" in today.");
    setTimeout(()=>amaPush({who:"ama",txt:"Logged — the team knows you're following "+q+" in today. All good, see you in there."}),350);
    return;
  }
  const nq=amaNorm(q);
  const passWord=/(swipe|pass|fob)/.test(nq);
  if(passWord&&/(forgot|someone|mate|friend|partner|follow|their|else|wife|husband|brother|sister)/.test(nq)){
    amaAwait="follow";
    setTimeout(()=>amaPush({who:"ama",txt:"No dramas — what's the full name of the member whose pass you're following in on? I'll log it with the team so everyone's square."}),350);
    return;
  }
  if(passWord&&/(lost|broke|broken|new|replace|replacement|missing|stopped|work|doesnt|damaged|need)/.test(nq)){
    sb.from("ama_misses").insert({user_id:session.user.id,question:"SWIPE PASS: "+me+" needs a new swipe pass — please have one ready for collection at the front desk."}).then(()=>{});
    pingStaff("Swipe Pass Needed",me+" needs a new swipe pass at the front desk.");
    setTimeout(()=>amaPush({who:"ama",txt:"I've notified our admin team — your new swipe pass will be waiting for you at the front desk. Collect it during the staffed afternoon hours, Mon–Fri 4–7pm, or the morning coached hours, Mon–Thu 5:15–7:45am and Saturday 8–11am."}),350);
    return;
  }
  const hit=amaMatch(q);
  setTimeout(()=>{
    if(hit)amaPush({who:"ama",txt:hit.a});
    else{
      amaPush({who:"ama",txt:"Good question — I don't have that one yet, but I've passed it to the team so they can teach me the answer. In the meantime, catch reception 4–7pm Mon–Thu (0401 587 508)."});
      sb.from("ama_misses").insert({user_id:session.user.id,question:q}).then(()=>{});
      pingStaff("AI Assistant — New Question",me+" asked: "+q);
    }
  },350);
}

  $("main").innerHTML=`
    <button class="backBtn" onclick="go('home')">‹ Back To Home</button>
    <div class="hero" style="background:linear-gradient(160deg,#17171a 0%,#0b0b0e 75%);padding:24px 22px">
      <div class="heroKicker">Staff Eyes Only</div>
      <div class="heroTitle">Staff Room</div>
      <div class="heroText">Members can't see or access anything in here.</div>
    </div>
    <div class="subTabs">${tabs.map(t=>`<button class="${staffSub===t.id?'active':''}" onclick="staffSub='${t.id}';renderStaff()">${esc(t.label)}</button>`).join("")}</div>

  else if(staffSub==="members")renderStaffMembersTab();

}
async function renderStaffInsights(){
  await loadWorld();
  if(view!=="staff"||staffSub!=="insights")return;const box=$("staffContent");if(!box)return;
  const now=Date.now();
  const lastSeen={};
  ptsData.events.filter(e=>e.kind==="class").forEach(e=>{
    const t=new Date(e.created_at).getTime();
    if(!lastSeen[e.user_id]||t>lastSeen[e.user_id])lastSeen[e.user_id]=t;
  });
  const nameOf=uid=>{const m=ptsData.mprofiles.find(x=>x.user_id===uid);return (m&&m.full_name)||"Unnamed Member";};
  const quiet=Object.entries(lastSeen).map(([uid,t])=>({uid,name:nameOf(uid),days:Math.floor((now-t)/86400000)}))
    .filter(x=>x.days>=14).sort((a,b)=>b.days-a.days).slice(0,25);
  const weeks=[];
  for(let i=5;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i*7);weeks.push(weekKey(d));}
  const counts=weeks.map(wk=>({wk,n:ptsData.events.filter(e=>e.kind==="class"&&weekKey(new Date(e.created_at))===wk).length}));
  const totals={};ptsData.events.forEach(e=>totals[e.user_id]=(totals[e.user_id]||0)+e.points);
  const topWeek=Object.entries(totals).map(([uid,p])=>({uid,name:nameOf(uid),p})).sort((a,b)=>b.p-a.p).slice(0,5);
  box.innerHTML=`
    <div class="secTitle">Weekly Attendance (Class Check-Ins)</div>
    <div class="card">${counts.map(c=>`<div class="weekRow"><span style="color:var(--muted)">Week of ${fmtDateAU(c.wk)}</span><span>${c.n}</span></div>`).join("")}</div>
    <div class="secTitle">Top Points This Ladder</div>
    <div class="card">${topWeek.length?topWeek.map(t=>`<div class="weekRow"><span>${esc(t.name)}</span><span style="color:var(--gold)">${t.p} pts</span></div>`).join(""):'<div class="emptyMsg">No points banked yet.</div>'}</div>
    <div class="secTitle">Gone Quiet — 14+ Days No Class</div>
    ${quiet.length?quiet.map(q=>`<div class="card"><b>${esc(q.name)}</b><div class="sub" style="margin-top:2px">Last class ${q.days} days ago</div></div>`).join(""):'<div class="card"><p>Nobody’s drifted — everyone’s been in within two weeks.</p></div>'}`;
}

async function sendStaffMsg(){

async function handlePtRequest(id){
  const {error}=await sb.from("pt_requests").delete().eq("id",id);
  toast(error?error.message:"Marked as handled.");
  renderStaff();
}
async function grantStaff(){
  const em=$("gaEmail").value.trim();if(!em){toast("Put their email in.");return;}
  const role=$("gaRole").value;
  if(role==="fighter"||role==="unfighter"){
    const {data,error}=await sb.rpc("grant_fighter",{target_email:em,make_fighter:role==="fighter"});
    toast(error?error.message:data);
    if(!error)renderStaff();
    return;
  }
  if(role==="blokes"||role==="unblokes"){
    const {data,error}=await sb.rpc("grant_blokes",{target_email:em,make_blokes:role==="blokes"});
    toast(error?error.message:data);
    if(!error)renderStaff();
    return;
  }
  if(role==="premium"||role==="unpremium"){
    const {data,error}=await sb.rpc("grant_premium",{target_email:em,make_premium:role==="premium"});
    toast(error?error.message:data);
    if(!error)renderStaff();
    return;
  }
  const {data,error}=await sb.rpc("grant_staff",{target_email:em,make_staff:role!=="remove",make_manager:role==="manager"});
  toast(error?error.message:data);
  if(!error)renderStaff();
}
function renderStaffMember(uid){
  const s=staffData.staff.find(x=>x.id===uid);
  if(!s){staffSub="chat";return renderStaff();}
  const me=session.user.id===uid,mgr=profile.is_manager;
  const tasks=staffData.tasks.filter(t=>t.assignee_id===uid);
  const open=tasks.filter(t=>t.status==="open");
  const noTime=tasks.filter(t=>t.status==="no_time");
  const doneToday=tasks.filter(t=>t.status==="done"&&t.done_at&&new Date(t.done_at).toDateString()===new Date().toDateString());
  const canTick=me||mgr;
  const reassignSel=t=>mgr?`<select class="miniSel" onchange="reassignTask('${t.id}',this.value)">
      <option value="">Move to…</option>
      ${staffData.staff.filter(x=>x.id!==t.assignee_id).map(x=>`<option value="${x.id}">${esc(x.first_name||x.email)}</option>`).join("")}
    </select>`:"";
  const taskRow=(t,kind)=>`<div class="ckTask">
      <div class="ckBoxes">
        ${kind==='done'?`<span class="ckBox on" ${canTick?`onclick="setTask('${t.id}','open')"`:""}>✓</span>`
         :kind==='no_time'?`<span class="ckBox off" ${canTick?`onclick="setTask('${t.id}','open')"`:""}>✕</span>`
         :`<span class="ckBox" ${canTick?`onclick="setTask('${t.id}','done')"`:""}>✓</span><span class="ckBox" ${canTick?`onclick="setTask('${t.id}','no_time')"`:""}>✕</span>`}
      </div>
      <div style="min-width:0;flex:1"><b style="${kind==='done'?'text-decoration:line-through;color:var(--muted)':''}">${esc(t.title)}</b>
        <small>${fmtDateAU(t.task_date)}${kind==='no_time'?' · <span style=\"color:var(--danger)\">marked incomplete</span>':''}</small>
        ${kind!=='done'&&mgr?reassignSel(t):""}
      </div>
      ${(mgr||me)?`<button class="xBtn" onclick="delTask('${t.id}')">×</button>`:""}
    </div>`;
  let comms="";
  if(me||mgr){
    const mine=staffData.comms.filter(c=>c.trainer_id===uid);
    const wk=weekStartOf(new Date()).getTime();
    const mo=new Date();mo.setDate(1);mo.setHours(0,0,0,0);
    const wkTot=mine.filter(c=>new Date(c.session_date+"T12:00:00")>=wk).reduce((a,c)=>a+Number(c.commission),0);
    const wkN=mine.filter(c=>new Date(c.session_date+"T12:00:00")>=wk).length;
    const moTot=mine.filter(c=>new Date(c.session_date+"T12:00:00")>=mo).reduce((a,c)=>a+Number(c.commission),0);
    comms=`<div class="secTitle">PT Session Log</div>
    <div class="statGrid">
      <div class="statBox"><div class="sv">$${wkTot.toFixed(0)}</div><div class="sl">Collected This Wk</div></div>
      <div class="statBox"><div class="sv">${wkN}</div><div class="sl">Sessions This Wk</div></div>
      <div class="statBox"><div class="sv">$${moTot.toFixed(0)}</div><div class="sl">Collected This Month</div></div>
    </div>
    ${me?`<div class="card">
      <div class="field"><label>Client Full Name</label><input id="pcClient" placeholder="e.g. Joe Smith"></div>
      <div class="field"><label>Session</label><select id="pcType">
        <option value="30">30 minutes — $10 commission</option>
        <option value="45" selected>1 hour — $15 commission</option>
        <option value="211">2-on-1 — $25 commission</option>
      </select></div>
      <button class="btnGold" onclick="addComm()">Log PT Session</button>
    </div>`:""}
    <div class="card">
      ${mine.length?mine.slice(0,25).map(c=>`<div class="sessItem">
        <div><b>${esc(c.client_name)}</b><small>${c.note==="2-on-1"?"2-on-1":c.minutes+" min"} PT · $${Number(c.commission).toFixed(2)} · ${fmtDateAU(c.session_date)}</small></div>
        ${(me||mgr)?`<button class="xBtn" onclick="delComm('${c.id}')">×</button>`:""}
      </div>`).join(""):'<div class="emptyMsg">No PT sessions logged yet.</div>'}
    </div>`;
  }
  $("staffContent").innerHTML=`
    <div class="card">
      <div style="display:flex;align-items:center;gap:12px">
        <div class="bpPhoto bpPhotoEmpty" style="width:56px;height:56px;font-size:20px">${esc((s.first_name||s.email)[0].toUpperCase())}</div>
        <div><h3 style="margin-bottom:2px">${esc(staffName(s))}</h3>
        <div class="pillRow">${s.is_manager?'<span class="pill" style="border-color:var(--gold);color:var(--gold)">Manager</span>':'<span class="pill">Staff</span>'}</div></div>
      </div>
    </div>
    ${noTime.length?`<div class="secTitle" style="color:var(--danger)">Marked Incomplete — Needs Redirecting</div>
    <div class="card" style="border-color:var(--danger)">${noTime.map(t=>taskRow(t,"no_time")).join("")}</div>`:""}
    <div class="secTitle">Daily Tasks</div>
    <div class="card">
      ${open.length?open.map(t=>taskRow(t,"open")).join(""):'<div class="emptyMsg">Nothing open. Clean slate.</div>'}
      ${(me||mgr)?`<div class="chatInput" style="margin-top:6px">
        <input id="tkNew" placeholder="Add a task for ${esc(s.first_name||'them')}…" maxlength="300" onkeydown="if(event.key==='Enter')addTask('${uid}')">
        <button onclick="addTask('${uid}')">＋</button>
      </div>`:""}
    </div>
    ${doneToday.length?`<div class="secTitle">Done Today</div><div class="card">${doneToday.map(t=>taskRow(t,"done")).join("")}</div>`:""}
    ${comms}`;
}
async function addTask(uid){
  const el=$("tkNew"),v=el.value.trim();if(!v)return;
  const {error}=await sb.from("staff_tasks").insert({assignee_id:uid,title:v,created_by:session.user.id,task_date:isoDateLocal()});
  if(error){toast(error.message);return;}
  renderStaff();
}
async function setTask(id,status){
  const upd={status};upd.done_at=status==="done"?new Date().toISOString():null;
  const {error}=await sb.from("staff_tasks").update(upd).eq("id",id);
  if(error){toast(error.message);return;}
  renderStaff();
}
async function reassignTask(id,uid){
  if(!uid)return;
  const {error}=await sb.from("staff_tasks").update({assignee_id:uid,status:"open"}).eq("id",id);
  toast(error?error.message:"Task redirected.");
  renderStaff();
}
async function delTask(id){
  const {error}=await sb.from("staff_tasks").delete().eq("id",id);
  if(error){toast(error.message);return;}
  renderStaff();
}
async function addComm(){
  const client=$("pcClient").value.trim();
  if(!client){toast("Whose session was it?");return;}
  const map={"30":{minutes:30,commission:10,note:""},"45":{minutes:60,commission:15,note:""},"211":{minutes:60,commission:25,note:"2-on-1"}};
  const m=map[$("pcType").value]||map["45"];
  const {error}=await sb.from("pt_commissions").insert({trainer_id:session.user.id,client_name:client,minutes:m.minutes,commission:m.commission,note:m.note,session_date:isoDateLocal()});
  if(error){toast(error.message);return;}
  toast("Logged — "+client+(m.note?" · 2-on-1":" · "+m.minutes+" min")+" · $"+m.commission+" commission banked.");
  renderStaff();
}
async function delComm(id){
  const {error}=await sb.from("pt_commissions").delete().eq("id",id);
  if(error){toast(error.message);return;}
  renderStaff();
}

/* ---- Members Chat (live via Supabase) ---- */
async function initChatFeed(){
  const {data}=await sb.from("legacy_messages").select("*").order("created_at",{ascending:true}).limit(200);
  msgs=data||[];
  updateBadges();
  if(chatChannel)sb.removeChannel(chatChannel);
  chatChannel=sb.channel("legacy-chat")
    .on("postgres_changes",{event:"INSERT",schema:"public",table:"legacy_messages"},payload=>{
      msgs.push(payload.new);
      if(view==="chat"){appendMsg(payload.new);markRead();}
      else updateBadges();
    })
    .subscribe();
}
function msgHtml(m){
  const mine=session&&m.user_id===session.user.id;
  return `<div class="msg${mine?' mine':''}"><div class="who">${esc(m.name)}</div><div class="txt">${esc(m.body)}</div><div class="time">${fmtWhen(m.created_at)}</div></div>`;
}
function renderChat(){
  $("main").innerHTML=`
    <img class="chatBgLogo" src="${LOGO}" alt="">
    <div class="chatWrap">
      <div id="chatMsgs">${msgs.length?msgs.map(msgHtml).join(""):'<div class="emptyMsg" style="text-align:center;margin-top:30px">No messages yet — start the conversation.</div>'}</div>
      <div class="chatInput">
        <input id="msgInput" placeholder="Message the members…" maxlength="1000" onkeydown="if(event.key==='Enter')sendMsg()">
        <button onclick="sendMsg()">➤</button>
      </div>
    </div>`;
  const box=$("chatMsgs");box.scrollTop=box.scrollHeight;
  markRead();
}
function appendMsg(m){
  const box=$("chatMsgs");if(!box)return;
  box.insertAdjacentHTML("beforeend",msgHtml(m));
  box.scrollTop=box.scrollHeight;
}
async function sendMsg(){
  const el=$("msgInput");const v=el.value.trim();
  if(!v)return;
  el.value="";
  const name=((profile.first_name||"")+" "+(profile.last_name||"")).trim()||"Member";
  const {error}=await sb.from("legacy_messages").insert({user_id:session.user.id,name,body:v});
  if(error){toast(error.message);el.value=v;}
}
function unreadCount(){
  if(!session)return 0;
  return msgs.filter(m=>new Date(m.created_at).getTime()>lastRead&&m.user_id!==session.user.id).length;
}
function markRead(){lastRead=Date.now();localStorage.setItem("lg_read",String(lastRead));updateBadges();}
function updateBadges(){
  const n=unreadCount();
  ["navBadge","tileBadge"].forEach(id=>{
    const b=$(id);if(!b)return;
    b.style.display=n>0?"flex":"none";b.textContent=n>99?"99+":n;
  });
  if(navigator.setAppBadge){n>0?navigator.setAppBadge(n).catch(()=>{}):navigator.clearAppBadge&&navigator.clearAppBadge().catch(()=>{});}
}

function renderProfile(){
  const p=profile||{};
  $("main").innerHTML=`
    <button class="backBtn" onclick="go('home')">‹ Back To Home</button>
    <div class="hero"><div class="heroKicker">Member Profile</div><div class="heroTitle">${esc((p.first_name||"")+" "+(p.last_name||""))}</div>

async function saveProfile(e){
  e.preventDefault();
  const upd={first_name:$("pfFirst").value.trim(),last_name:$("pfLast").value.trim(),phone:$("pfPhone").value.trim(),dob:$("pfDob").value};
  const {error}=await sb.from("profiles").update(upd).eq("id",session.user.id);
  if(error)$("pfMsg").innerHTML=`<div class="denyBox">${esc(error.message)}</div>`;
  else{profile={...profile,...upd};$("profileBtn").textContent=(upd.first_name[0]+upd.last_name[0]).toUpperCase();$("pfMsg").innerHTML=`<div class="okBox">Profile saved.</div>`;}
  return false;
}
